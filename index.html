function copyBeerBankSummary() {
  const s = activeSeason();
  if (!s) { toast('No active season','bad'); return; }
  const players = seasonPlayers(s.id);
  players.sort((a,b) => beerBalanceFor(b.id) - beerBalanceFor(a.id));
  const lines = [`🍺 Beer Bank — ${s.name}`,''];
  players.forEach(p => {
    const bal = beerBalanceFor(p.id);
    const str = bal < 0 ? `-$${Math.abs(bal).toFixed(2)}` : `$${bal.toFixed(2)}`;
    lines.push(`${p.name}: ${str}`);
  });
  const text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(()=>toast('Copied — paste into WhatsApp 🍺','good'))
      .catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast('Copied!','good'); }
  catch(e) { toast('Copy failed — try long-pressing the text','bad'); }
  document.body.removeChild(ta);
}


function renderBeerBank() {
  const s = activeSeason();
  if (!s) return `<div class="matrix-empty">No active season.</div>`;
  const players = seasonPlayers(s.id);
  const games = seasonGames(s.id);

  const totalBeersConsumed = players.reduce((sum,p) => sum + seasonBeersForPlayer(p.id, s.id), 0);
  const beerValue = totalBeersConsumed * (state.pricePerBeer || 0);
  const totalCarry = players.reduce((sum,p) => sum + (parseFloat(p.startingBeerBalance)||0), 0);
  const totalBeerPaid = players.reduce((sum,p) => sum + playerPaymentsSum(p.id,null,'beer'), 0);
  const fundTotal = totalCarry + totalBeerPaid - beerValue;
  const bpg = teamBPG(s.id);

  const typeOrder = { full:1, part:2, sub:3, spare:4, goalie:5, ir:6 };
  players.sort((a,b) => {
    const tA = typeOrder[a.type]||99, tB = typeOrder[b.type]||99;
    if (tA!==tB) return tA-tB;
    return (a.name||'').localeCompare(b.name||'');
  });

  // Awards
  const masterWinners = topAward(players, pId => seasonBeersForPlayer(pId, s.id), 1);
  const loverWinners  = topAward(players, pId => seasonBPGForPlayer(pId, s.id), 0.1);
  const threeWinners  = topAward(players, pId => threeBeerPoints(pId, s.id), 1);

  return `
    <div class="stats-row">
      <div class="stat"><div class="lbl">🍺 Beer Fund Total</div><div class="val">${fmtSigned(fundTotal)}</div><div class="note">all players combined</div></div>
      <div class="stat"><div class="lbl">Beers Consumed</div><div class="val">${totalBeersConsumed} 🍺</div><div class="note">≈ ${fmtCompact(beerValue)} at ${fmt(state.pricePerBeer)}/beer</div></div>
      <div class="stat"><div class="lbl">BPG</div><div class="val">${bpg.toFixed(1)} 🍺</div><div class="note">beers per game (team avg)</div></div>
      <div class="stat"><div class="lbl">🏆 Most Beers in a Game</div><div class="val">${(() => {
        if (!games.length) return '—';
        let best = null, bestCount = -1;
        games.forEach(g => {
          const cnt = beersForGame(g.id);
          if (cnt > bestCount) { bestCount = cnt; best = g; }
        });
        if (!best || bestCount === 0) return '—';
        return `<span style="font-size:13px;line-height:1.5">Game ${best.number || '?'}<br><span style="font-size:11px;font-weight:400;color:var(--muted)">${fmtDateShort(best.date)}${best.time ? ' · ' + fmtAmPm(best.time) : ''}<br>${esc(best.opponent || 'TBD')}<br>${bestCount} Beers 🍺</span></span>`;
      })()}</div></div>
    </div>

    <div class="action-bar">
      ${isAdmin ? `<button class="btn btn-rust" onclick="openPaymentModal(null,'beer')">+ Record Beer Payment</button>` : ''}
      <button class="btn btn-ghost" onclick="copyBeerBankSummary()">📋 Copy for WhatsApp</button>
      <div class="spacer"></div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">Price per beer: ${fmt(state.pricePerBeer)}${isAdmin ? ' · <a href="#" onclick="event.preventDefault();setActiveTab(\'settings\')" style="color:var(--rust);">change</a>' : ''}</span>
    </div>

    <div class="trophy-row">
      ${renderTrophyCard(
        BADGE_BEER_MASTER_B64,
        'Beer Master',
        'Most beers consumed in the season',
        masterWinners,
        v => `${v} 🍺`,
        ''
      )}
      ${renderTrophyCard(
        BADGE_BEER_LOVER_B64,
        'Beer Lover',
        'Best beers-per-game average',
        loverWinners,
        v => `${v.toFixed(1)} BPG`,
        ''
      )}
      ${renderTrophyCard(
        BADGE_THREE_BEERS_B64,
        'Three Beers Award',
        'Most games with exactly 3 beers',
        threeWinners,
        v => `${v} game${v===1?'':'s'}`,
        ''
      )}
    </div>

    ${players.length === 0 ? `<div class="matrix-empty">No players yet.</div>` : renderBeerMatrix(s, players, games)}

    <div class="legend">
      <span class="legend-item"><span class="legend-sw" style="background:var(--paper-3);">0</span> none</span>
      <span class="legend-item"><span class="legend-sw" style="background:var(--beer-1);">1</span></span>
      <span class="legend-item"><span class="legend-sw" style="background:var(--beer-2);">2</span></span>
      <span class="legend-item"><span class="legend-sw" style="background:var(--beer-3);">3</span></span>
      <span class="legend-item"><span class="legend-sw" style="background:var(--beer-4);color:white;">4</span></span>
      <span class="legend-item"><span class="legend-sw" style="background:var(--beer-5);color:white;">5+</span></span>
      <span style="margin:0 8px;color:var(--line-dark);">|</span>
      <span>Balance = Carry + Paid − (Beers × ${fmt(state.pricePerBeer)})</span>
    </div>
  `;
}


function renderBeerMatrix(s, players, games) {
  const today = isoToday();
  let head = `<tr>
    <th class="stk stk-2">Pos</th><th class="stk stk-3">Name</th>
    <th class="stk stk-4">Paid</th><th class="stk stk-5b">Beers</th>
    <th class="stk stk-6">Balance</th>`;
  games.forEach((g, idx) => {
    const isPast = g.date && g.date < today;
    const isUnlocked = unlockedPastGames.has(g.id);
    const lockBtn = isPast && isAdmin ? `<div class="game-lock-btn" onclick="event.stopPropagation();toggleGameLock('${g.id}')" title="${isUnlocked ? 'Lock' : 'Unlock to edit'}">${isUnlocked ? '🔓' : '🔒'}</div>` : '';
    head += `<th class="game-col${isPast && !isUnlocked ? ' game-past-locked' : ''}" title="${esc(g.opponent || 'TBD')}">
      <div class="gnum">GAME ${g.number || idx + 1}</div>
      <div class="gdate">${fmtDayShort(g.date)} ${fmtDateTiny(g.date)}</div>
      <div class="gopp">${esc(g.opponent || 'TBD')}</div>
      ${lockBtn}
    </th>`;
  });
  head += `<th class="games-played">Avg/G</th></tr>`;

  let body = '';
  let lastType = null;
  players.forEach((p, idx) => {
    if (p.type !== lastType) {
      const info = TYPE_INFO[p.type] || TYPE_INFO.full;
      body += `<tr class="section-divider">
        <td class="stk stk-2" style="padding-left:8px" colspan="2">${info.label}</td>
        <td class="stk stk-4"></td><td class="stk stk-5b"></td><td class="stk stk-6"></td>
        ${games.map(() => `<td></td>`).join('')}<td></td>
      </tr>`;
      lastType = p.type;
    }
    const beerPaid = playerPaymentsSum(p.id, null, 'beer');
    const beerCount = totalBeersForPlayer(p.id);
    const balance = beerBalanceFor(p.id);
    const avg = avgBeersPerGame(p.id);
    let balCls = 'bal-zero';
    if (balance > 0.01) balCls = 'bal-paid';
    else if (balance < -0.01) balCls = 'bal-owe';

    const tintMap = { full:'#FFFAE8',part:'#F3FAF3',sub:'#F0F0FB',spare:'#F7F7F7',goalie:'#FFF4E0',ir:'#FFF0F0' };
    const rowTint = tintMap[p.type]||'transparent';
    body += `<tr class="t-${p.type}" data-pid="${p.id}" style="background:${rowTint}">
      <td class="stk stk-2">${esc(p.position || '')}</td>
      <td class="stk stk-3" onclick="openProfile('${p.id}')" style="cursor:pointer"><span class="matrix-name-cell" style="display:inline-flex;align-items:center;gap:5px">${renderAvatar(p, 'sm')}<span>${esc(p.name)}</span></span></td>
      
      <td class="stk stk-4" ${isAdmin ? `onclick="openPaymentModal('${p.id}','beer')" style="cursor:pointer;"` : ''}>${fmtCompact(beerPaid)}</td>
      <td class="stk stk-5">${beerCount}</td>
      <td class="stk stk-6 ${balCls}">${fmtSigned(balance)}</td>`;
    games.forEach(g => {
      const isPast = g.date && g.date < today;
      const isUnlocked = unlockedPastGames.has(g.id);
      const editable = isAdmin && (!isPast || isUnlocked);
      const beers = parseInt((state.beers[g.id] || {})[p.id]) || 0;
      const att = (state.attendance[g.id] || {})[p.id];
      const wasIn = att === 'in';
      const bucket = beers >= 5 ? 'b-5' : 'b-' + beers;
      const cls = (wasIn ? 'beer-cell ' + bucket : 'beer-cell not-in') + (isPast && !isUnlocked ? ' att-locked' : '');
      const display = wasIn ? (beers || '') : '';
      body += `<td class="${cls}"><input type="number" min="0" max="99" value="${display}" ${wasIn && editable ? `onchange="updateBeer('${g.id}','${p.id}',this.value)"` : 'readonly disabled'} title="${wasIn ? esc(p.name) + ' — Game ' + (g.number || '') : 'Not IN'}${isPast && !isUnlocked ? ' (locked)' : ''}"></td>`;
    });
    body += `<td class="games-played ${beerCount === 0 ? 'zero' : ''}">${avg.toFixed(1)}</td></tr>`;
  });

  let totalsRow = `<tr class="bodies-row">
    <td class="stk stk-2"></td>
    <td class="stk stk-3 label">Total Beers</td>
    <td class="stk stk-4"></td>
    <td class="stk stk-5b"></td>
    <td class="stk stk-6"></td>`;
  games.forEach(g => { totalsRow += `<td class="body-cnt">${beersForGame(g.id)}</td>`; });
  const grandTotal = games.reduce((sum, g) => sum + beersForGame(g.id), 0);
  totalsRow += `<td class="body-cnt" style="font-size:13px;">${grandTotal}</td></tr>`;

  return `<div class="matrix-scroll-outer"><button class="matrix-arrow matrix-arrow-left" onclick="scrollMatrix(this,-1)" title="Scroll left">‹</button><div class="matrix-wrap beer-matrix-wrap"><table class="matrix"><thead>${head}</thead><tbody>${body}${totalsRow}</tbody></table></div><button class="matrix-arrow matrix-arrow-right" onclick="scrollMatrix(this,1)" title="Scroll right">›</button></div>`;
}

async function updateBeer(gameId, playerId, val) {
  if (!requireAdmin()) return;
  const n = parseInt(val);
  if (!state.beers[gameId]) state.beers[gameId] = {};
  if (!val || n === 0 || isNaN(n)) delete state.beers[gameId][playerId];
  else state.beers[gameId][playerId] = Math.max(0, n);
  await saveState();
  render();
}

async function updateCarry(playerId, val) {
  if (!requireAdmin()) return;
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;
  p.startingBeerBalance = parseFloat(val) || 0;
  await saveState();
  render();
}

// =============== PLAYER PROFILE ===============
function openProfile(playerId) {
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;
  const s = activeSeason();
  const re = getRosterEntry(playerId, s?.id);
  const typeInfo = TYPE_INFO[re?.type] || null;
  const allocated = parseFloat(re?.allocated) || 0;
  const teamPaid = playerPaymentsSum(playerId, s?.id, 'team');
  const teamBalance = allocated - teamPaid;
  const gp = s ? gamesPlayedFor(playerId, s.id) : 0;
  const eligible = s && gp >= (s.playoffMinGames || 4);
  const beerBal = beerBalanceFor(playerId);
  const totalBeers = totalBeersForPlayer(playerId);
  const avg = avgBeersPerGame(playerId);
  const allPays = state.payments.filter(x => x.playerId === playerId).sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const beerStatCls = beerBal > 0.01 ? 'beer-pos' : (beerBal < -0.01 ? 'beer-neg' : '');

  openModal(`
    <div class="profile-header" style="flex-wrap:wrap;">
      <div style="display:flex;gap:12px;align-items:flex-end;">
        ${renderAvatar(p, 'lg')}
      </div>
      <div class="profile-info">
        <h3>${esc(p.name)}</h3>
        <div class="meta">
          ${re?.jerseyNumber ? `<span class="jersey">#${esc(re.jerseyNumber)}</span> · ` : ''}
          ${esc(p.position || '?')}${re ? ' · ' + (typeInfo?.label || re.type) : ''}
        </div>
        ${re ? `<span class="pill ${re.type === 'full' ? 'good' : re.type === 'ir' ? 'bad' : 'warn'}">${typeInfo?.short || re.type}</span>` : '<span class="pill">Not on current roster</span>'}
      </div>
    </div>
    <div class="profile-stats">
      <div class="profile-stat"><div class="l">Games Played</div><div class="v">${gp}</div><div class="n">this season</div></div>
      <div class="profile-stat ${eligible ? 'good' : ''}"><div class="l">Playoff Eligible</div><div class="v">${eligible ? '✓ Yes' : '✗ No'}</div><div class="n">min ${s?.playoffMinGames || 4} games</div></div>
      <div class="profile-stat ${teamBalance > 0.01 ? 'bad' : (allocated > 0 ? 'good' : '')}"><div class="l">Team Fees</div><div class="v small">${teamBalance > 0.01 ? fmt(teamBalance) + ' owed' : (allocated > 0 ? '✓ paid' : '—')}</div><div class="n">${fmt(teamPaid)} of ${fmt(allocated)}</div>${teamBalance > 0.01 ? '<a href="https://bench.ashl.ca/blogin" target="_blank" rel="noopener" style="display:inline-block;margin-top:7px;font-size:12px;font-weight:600;color:var(--rust);text-decoration:none;border:1.5px solid var(--rust);padding:5px 12px;border-radius:6px;background:rgba(198,107,61,0.07);">💳 Make payment to ASHL →</a>' : ''}</div>
      <div class="profile-stat ${beerStatCls}"><div class="l">🍺 Beer Bank</div><div class="v">${fmtSigned(beerBal)}</div><div class="n">${beerBal >= 0 ? 'credit' : 'owes'}</div></div>
      <div class="profile-stat"><div class="l">Total Beers</div><div class="v">${totalBeers} 🍺</div><div class="n">all games tracked</div></div>
      <div class="profile-stat"><div class="l">Avg Beers/Game</div><div class="v">${avg.toFixed(1)}</div><div class="n">when playing</div></div>
    </div>
    <div class="profile-notes">${re?.notes ? esc(re.notes) : '<em>No notes yet</em>'}</div>
    <div class="row-spread">
      <h4 style="font-family:'Fraunces',serif;font-size:16px;font-weight:700;">Payments</h4>
      ${isAdmin ? `<div style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="openPaymentModal('${playerId}','team')">+ Team Fee</button>
        <button class="btn btn-sm" onclick="openPaymentModal('${playerId}','beer')" style="background:#C77A1F;">+ Beer Payment 🍺</button>
      </div>` : ''}
    </div>
    <div class="pay-list">
      ${allPays.length === 0 ? '<div style="padding:8px;color:var(--muted);font-style:italic;">No payments yet.</div>' :
        allPays.map(pay => `
          <div class="pay-item ${pay.fund || 'team'}">
            <span class="pd">${fmtDateShort(pay.date)}</span>
            <span class="pa">${pay.fund === 'beer' ? '🍺 ' : ''}${fmt(pay.amount)}</span>
            <span class="pm">${esc(pay.method || '')}${pay.notes ? ' · ' + esc(pay.notes) : ''}</span>
            ${isAdmin ? `<button class="btn-icon btn-danger" onclick="deletePaymentFromProfile('${pay.id}','${playerId}')" title="Delete">✕</button>` : '<span></span>'}
          </div>
        `).join('')}
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">Close</button>
      ${isAdmin ? `<button type="button" class="btn btn-rust" onclick="openEditPlayer('${playerId}')">Edit Profile</button>` : ''}
    </div>
  `);
}

async function deletePaymentFromProfile(payId, playerId) {
  if (!requireAdmin()) return;
  if (!confirm('Delete this payment?')) return;
  state.payments = state.payments.filter(p => p.id !== payId);
  await saveState();
  toast('Payment deleted', 'good');
  openProfile(playerId);
  if (activeTab === 'dashboard' || activeTab === 'beer') render();
}

// =============== ADD/EDIT PLAYER ===============
function openAddPlayer() {
  if (!requireAdmin()) return;
  const s = activeSeason();
  if (!s) { toast('No active season', 'bad'); return; }
  const onRoster = new Set(Object.keys(state.rosters[s.id] || {}));
  const available = state.players.filter(p => !onRoster.has(p.id));
  const optsHtml = available.length === 0 ? '<option value="">— no others —</option>' :
    '<option value="">— add existing player —</option>' + available.map(p => `<option value="${p.id}">${esc(p.name)} (${esc(p.position || '?')})</option>`).join('');

  openModal(`
    <h3>Add Player</h3>
    ${available.length > 0 ? `
      <div class="field">
        <label>Add existing player to this season</label>
        <div style="display:flex;gap:6px;"><select id="existSel">${optsHtml}</select><button class="btn" onclick="addExistingPlayer()">Add</button></div>
      </div>
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">— or create new player —</div>

    <form id="newPlayerForm">
      <div class="field"><label>Name</label><input type="text" name="name" required autofocus oninput="document.getElementById('addPhotoPreview').innerHTML = this.value ? renderAvatar({name:this.value},'lg') : renderAvatar({name:''},'lg');"></div>
      <div class="field-row">
        <div class="field"><label>Position</label><select name="position"><option value="F">F</option><option value="D">D</option><option value="F/D">F/D</option><option value="G">G</option></select></div>
        <div class="field"><label>Type</label><select name="type" onchange="updateAllocOnTypeChange(this)">${Object.entries(TYPE_INFO).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('')}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Jersey #</label><input type="text" name="jerseyNumber"></div>
        <div class="field"><label>Allocated ($)</label><input type="number" name="allocated" step="0.01" min="0" value="${s.fullTimeDefault}" id="allocInput"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Beer Carry Balance ($)</label><input type="number" name="startingBeerBalance" step="0.01" value="0"></div>
        <div class="field"><label>Notes</label><input type="text" name="notes"></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:18px;align-items:flex-start;">
        <div style="flex-shrink:0;">
          <label style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;display:block;margin-bottom:6px;">Profile Photo</label>
          <div id="addPhotoPreview" style="margin-bottom:8px;">${renderAvatar({name:''}, 'lg')}</div>
          <input type="file" id="addPhotoFile" accept="image/*" style="display:none;" onchange="handlePhotoChange(this,'addPhotoPreview','addPhotoData')">
          <input type="hidden" id="addPhotoData" name="photo" value="">
          <div style="display:flex;gap:6px;">
            <button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById('addPhotoFile').click()">Choose Photo</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="clearPhotoField('addPhotoPreview','addPhotoData', document.querySelector('#newPlayerForm input[name=name]').value)">Clear</button>
          </div>
        </div>
        <div class="help-text" style="margin-top:24px;flex:1;">Upload a square photo (will be auto-cropped to a circle). If no photo, the player's initials will show as a colored circle.</div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-rust">Add Player</button>
      </div>
    </form>
  `, () => {
    document.getElementById('newPlayerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const f = new FormData(e.target);
      const name = f.get('name').trim();
      if (!name) { toast('Name required', 'bad'); return; }
      const photo = document.getElementById('addPhotoData').value || '';
      const newP = { id: uid(), name, position: f.get('position'),
        startingBeerBalance: parseFloat(f.get('startingBeerBalance')) || 0, photo };
      state.players.push(newP);
      state.rosters[s.id][newP.id] = {
        type: f.get('type'), jerseyNumber: f.get('jerseyNumber').trim(),
        hasJersey: !!f.get('jerseyNumber').trim(),
        allocated: parseFloat(f.get('allocated')) || 0, notes: f.get('notes').trim()
      };
      await saveState();
      toast('Player added', 'good'); closeModal(); render();
    });
  });
}

function updateAllocOnTypeChange(sel) {
  const type = sel.value;
  const s = activeSeason();
  const info = TYPE_INFO[type];
  if (!info) return;
  let defaultAmt = type === 'full' ? (s.fullTimeDefault || 0) : type === 'part' ? (s.partTimeDefault || 0) : info.defaultAlloc;
  const inp = document.getElementById('allocInput');
  if (inp) inp.value = defaultAmt;
}

async function addExistingPlayer() {
  if (!requireAdmin()) return;
  const sel = document.getElementById('existSel');
  if (!sel.value) { toast('Select a player', 'bad'); return; }
  const s = activeSeason();
  state.rosters[s.id][sel.value] = { type:'full', jerseyNumber:'', hasJersey:false, allocated: s.fullTimeDefault || 0, notes:'' };
  await saveState();
  toast('Player added', 'good'); closeModal(); render();
}

async function removePlayerFromSeason(playerId) {
  if (!requireAdmin()) return;
  if (!confirm('Remove this player from this season? Their payment history stays.')) return;
  const s = activeSeason();
  delete state.rosters[s.id][playerId];
  seasonGames(s.id).forEach(g => {
    if (state.attendance[g.id]) delete state.attendance[g.id][playerId];
    if (state.beers[g.id]) delete state.beers[g.id][playerId];
  });
  Object.keys(state.lineups).forEach(gId => {
    const game = state.games.find(g => g.id === gId);
    if (!game || game.seasonId !== s.id) return;
    const lu = state.lineups[gId];
    ['f1','f2','f3'].forEach(k => { if (lu[k]) ['L','C','R'].forEach(pos => { if (lu[k][pos] === playerId) lu[k][pos] = ''; }); });
    ['d1','d2'].forEach(k => { if (lu[k]) ['L','R'].forEach(pos => { if (lu[k][pos] === playerId) lu[k][pos] = ''; }); });
    if (lu.g === playerId) lu.g = '';
  });
  await saveState();
  toast('Removed from season', 'good'); closeModal(); render();
}

async function deletePlayerEverywhere(playerId) {
  if (!requireAdmin()) return;
  if (!confirm('Delete this player ENTIRELY — every season, payments, attendance, beers? Cannot be undone.')) return;
  state.players = state.players.filter(p => p.id !== playerId);
  Object.keys(state.rosters).forEach(sId => delete state.rosters[sId][playerId]);
  Object.keys(state.attendance).forEach(gId => { if (state.attendance[gId]) delete state.attendance[gId][playerId]; });
  Object.keys(state.beers).forEach(gId => { if (state.beers[gId]) delete state.beers[gId][playerId]; });
  state.payments = state.payments.filter(p => p.playerId !== playerId);
  Object.keys(state.lineups).forEach(gId => {
    const lu = state.lineups[gId];
    ['f1','f2','f3'].forEach(k => { if (lu[k]) ['L','C','R'].forEach(p => { if (lu[k][p] === playerId) lu[k][p] = ''; }); });
    ['d1','d2'].forEach(k => { if (lu[k]) ['L','R'].forEach(p => { if (lu[k][p] === playerId) lu[k][p] = ''; }); });
    if (lu.g === playerId) lu.g = '';
  });
  await saveState();
  toast('Player deleted', 'good'); closeModal(); render();
}

// ═══════════════════════════════════════════════════════
// AUTO BUILD + SWAP
// ═══════════════════════════════════════════════════════

let swapMode  = false;
let swapSlot1 = null; // { slotKey, posKey } of first selected slot

// Slot history: how often each player has played each position
function getSlotHistory(playerId) {
  const h = {
    LW:{n:0,ts:0}, C:{n:0,ts:0}, RW:{n:0,ts:0},
    LD:{n:0,ts:0}, RD:{n:0,ts:0}, G:{n:0,ts:0}
  };
  Object.entries(state.lineups || {}).forEach(([gId, lu]) => {
    if (!lu) return;
    const game = state.games.find(x => x.id === gId);
    const ts   = game && game.date ? new Date(game.date).getTime() : 0;
    const bump = slot => { h[slot].n++; h[slot].ts = Math.max(h[slot].ts, ts); };
    ['f1','f2','f3'].forEach(k => {
      if (!lu[k]) return;
      if (lu[k].L === playerId) bump('LW');
      if (lu[k].C === playerId) bump('C');
      if (lu[k].R === playerId) bump('RW');
    });
    ['d1','d2'].forEach(k => {
      if (!lu[k]) return;
      if (lu[k].L === playerId) bump('LD');
      if (lu[k].R === playerId) bump('RD');
    });
    if (lu.g === playerId) bump('G');
  });
  return h;
}

// Returns { group:'fwd'|'def'|'goal', slot:'LW'|'C'|'RW'|'LD'|'RD'|null }
function getPreferredPosition(playerId, rosterPos) {
  const h     = getSlotHistory(playerId);
  const fwdN  = h.LW.n + h.C.n + h.RW.n;
  const defN  = h.LD.n + h.RD.n;
  const goalN = h.G.n;

  // No history → use roster position (F/D or blank → def; F → fwd; G → goal)
  if (fwdN + defN + goalN === 0) {
    const p = (rosterPos || '').toUpperCase().trim();
    if (p === 'G') return { group:'goal', slot:null };
    if (p === 'D' || p === 'F/D' || p === 'FD') return { group:'def', slot:null };
    return { group:'fwd', slot:null };
  }

  // Pick group with highest count; break ties by most-recent timestamp
  const groups = [
    { g:'goal', n:goalN, ts:h.G.ts },
    { g:'def',  n:defN,  ts:Math.max(h.LD.ts, h.RD.ts) },
    { g:'fwd',  n:fwdN,  ts:Math.max(h.LW.ts, h.C.ts, h.RW.ts) },
  ].filter(x => x.n > 0).sort((a,b) => b.n !== a.n ? b.n - a.n : b.ts - a.ts);
  const group = groups[0].g;

  // Pick preferred slot within group
  let slot = null;
  if (group === 'fwd') {
    const best = [
      { s:'C',  n:h.C.n,  ts:h.C.ts },
      { s:'LW', n:h.LW.n, ts:h.LW.ts },
      { s:'RW', n:h.RW.n, ts:h.RW.ts },
    ].filter(x => x.n > 0).sort((a,b) => b.n !== a.n ? b.n - a.n : b.ts - a.ts);
    slot = best[0]?.s || null;
  } else if (group === 'def') {
    if      (h.LD.n > h.RD.n) slot = 'LD';
    else if (h.RD.n > h.LD.n) slot = 'RD';
    else if (h.LD.n > 0) slot = h.LD.ts >= h.RD.ts ? 'LD' : 'RD';
  }
  return { group, slot };
}

// Which forward slots to use based on headcount (2C rule for < 9)
function getForwardSlots(n) {
  if (n >= 9) return [
    {key:'f1',pos:'L',name:'LW'},{key:'f1',pos:'C',name:'C'},{key:'f1',pos:'R',name:'RW'},
    {key:'f2',pos:'L',name:'LW'},{key:'f2',pos:'C',name:'C'},{key:'f2',pos:'R',name:'RW'},
    {key:'f3',pos:'L',name:'LW'},{key:'f3',pos:'C',name:'C'},{key:'f3',pos:'R',name:'RW'},
  ];
  if (n >= 6) return [   // 2C rule: Line 3 has no centre
    {key:'f1',pos:'L',name:'LW'},{key:'f1',pos:'C',name:'C'},{key:'f1',pos:'R',name:'RW'},
    {key:'f2',pos:'L',name:'LW'},{key:'f2',pos:'C',name:'C'},{key:'f2',pos:'R',name:'RW'},
    {key:'f3',pos:'L',name:'LW'},{key:'f3',pos:'R',name:'RW'},
  ];
  if (n >= 4) return [
    {key:'f1',pos:'L',name:'LW'},{key:'f1',pos:'C',name:'C'},{key:'f1',pos:'R',name:'RW'},
    {key:'f2',pos:'L',name:'LW'},{key:'f2',pos:'R',name:'RW'},
  ];
  if (n === 3) return [
    {key:'f1',pos:'L',name:'LW'},{key:'f1',pos:'C',name:'C'},{key:'f1',pos:'R',name:'RW'},
  ];
  if (n === 2) return [{key:'f1',pos:'L',name:'LW'},{key:'f1',pos:'R',name:'RW'}];
  if (n === 1) return [{key:'f1',pos:'C',name:'C'}];
  return [];
}

// Fill slots greedily: prefer exact slot match, then any available
function fillSlots(players, slots, lu) {
  let avail = [...slots];
  players.forEach(info => {
    if (!avail.length) return;
    const exact = avail.find(s => s.name === info.slot);
    const chosen = exact || avail[0];
    lu[chosen.key][chosen.pos] = info.p.id;
    avail = avail.filter(s => s !== chosen);
  });
}

async function autoBuildLineup(gameId) {
  if (!requireAdmin()) return;
  const s = activeSeason();
  if (!s) { toast('No active season', 'bad'); return; }

  ensureLineup(gameId);
  const att     = state.attendance[gameId] || {};
  const players = seasonPlayers(s.id).filter(p => att[p.id] === 'in' && p.type !== 'ir');

  if (players.length === 0) {
    toast('No players marked IN — mark attendance first', 'bad');
    return;
  }

  // Classify each player
  let goalPool = [], defPool = [], fwdPool = [];
  players.forEach(p => {
    const { group, slot } = getPreferredPosition(p.id, p.position);
    const info = { p, group, slot };
    if      (group === 'goal') goalPool.push(info);
    else if (group === 'def')  defPool.push(info);
    else                        fwdPool.push(info);
  });

  // ── Rule: min 3 defenders (if we have enough forwards to spare) ──
  while (defPool.length < 3 && fwdPool.length > 2) {
    fwdPool.sort((a,b) => {
      const ha = getSlotHistory(a.p.id), hb = getSlotHistory(b.p.id);
      return (hb.LD.n + hb.RD.n) - (ha.LD.n + ha.RD.n); // most def-capable first
    });
    const moved = fwdPool.shift();
    moved.group = 'def'; moved.slot = null; defPool.push(moved);
  }

  // ── Rule: max 4 defenders (d1+d2 only) — overflow goes to forward ──
  while (defPool.length > 4) {
    defPool.sort((a,b) => {
      const ha = getSlotHistory(a.p.id), hb = getSlotHistory(b.p.id);
      return (hb.LW.n + hb.C.n + hb.RW.n) - (ha.LW.n + ha.C.n + ha.RW.n);
    });
    const moved = defPool.shift(); // most fwd-capable defender → forward
    moved.group = 'fwd'; moved.slot = null; fwdPool.push(moved);
  }

  // Extra goalies → forward (rare edge case)
  goalPool.slice(1).forEach(g => { g.group='fwd'; fwdPool.push(g); });

  // Reset lineup
  const lu = state.lineups[gameId];
  lu.f1={L:'',C:'',R:''}; lu.f2={L:'',C:'',R:''}; lu.f3={L:'',C:'',R:''};
  lu.d1={L:'',R:''}; lu.d2={L:'',R:''}; lu.g='';

  // Assign goalie
  if (goalPool[0]) lu.g = goalPool[0].p.id;

  // Assign defenders (prefer LD first to fill left slots, RD to right)
  defPool.sort((a,b) => {
    const rank = s => s==='LD'?0 : s==='RD'?1 : 2;
    return rank(a.slot) - rank(b.slot);
  });
  const defSlots = [
    {key:'d1',pos:'L',name:'LD'},{key:'d1',pos:'R',name:'RD'},
    {key:'d2',pos:'L',name:'LD'},{key:'d2',pos:'R',name:'RD'},
  ];
  fillSlots(defPool, defSlots, lu);

  // Assign forwards (centres get their slot first)
  fwdPool.sort((a,b) => {
    const rank = s => s==='C'?0 : s==='LW'?1 : s==='RW'?2 : 3;
    return rank(a.slot) - rank(b.slot);
  });
  const fwdSlots = getForwardSlots(fwdPool.length);
  fillSlots(fwdPool, fwdSlots, lu);

  await saveState(); render();
  toast(`⚡ Lineup built — ${players.length} players. Tap Swap to adjust.`, 'good');
}

// ── Swap mode ──
function toggleSwapMode() {
  swapMode  = !swapMode;
  swapSlot1 = null;
  render();
  if (swapMode) toast('Swap ON — tap a slot to select', 'good');
}

function handleSwapClick(gameId, slotKey, posKey) {
  if (!swapMode) return;
  const lu = state.lineups[gameId];
  if (!lu) return;

  // Get value in clicked slot
  const getVal = (sk, pk) => sk === 'g' ? lu.g : (lu[sk]?.[pk] || '');
  const setVal = (sk, pk, v) => { if (sk === 'g') lu.g = v; else if (lu[sk]) lu[sk][pk] = v; };

  const clickedVal = getVal(slotKey, posKey);

  if (!swapSlot1) {
    if (!clickedVal) { toast('Select a filled slot to swap', 'bad'); return; }
    swapSlot1 = { slotKey, posKey };
    render();
    toast('Slot selected — now tap the slot to swap with', 'good');
    return;
  }

  // Check same slot clicked — deselect
  if (swapSlot1.slotKey === slotKey && swapSlot1.posKey === posKey) {
    swapSlot1 = null; render(); return;
  }

  // Perform swap
  const val1 = getVal(swapSlot1.slotKey, swapSlot1.posKey);
  const val2 = getVal(slotKey, posKey);
  setVal(swapSlot1.slotKey, swapSlot1.posKey, val2);
  setVal(slotKey, posKey, val1);

  swapSlot1 = null;
  saveState().then(() => render());
  toast('Players swapped!', 'good');
}

function openLineupPicker(gameId, slotKey, posKey) {
  if (!requireAdmin()) return;
  const s = activeSeason();
  if (!s) { toast('No active season','bad'); return; }
  ensureLineup(gameId);
  const lu = state.lineups[gameId];
  const att = state.attendance[gameId] || {};
  const allSeason = seasonPlayers(s.id);
  const normalise = pos => (pos||'').toUpperCase().trim();
  const filter = slotKey.startsWith('f') ? 'fwd' : 'def';
  const matchesPos = p => {
    const pos = normalise(p.position);
    return filter === 'fwd' ? (pos==='F'||pos==='F/D'||pos==='FD') : (pos==='D'||pos==='F/D'||pos==='FD');
  };

  // Only show IN players — sorted: position match first, then others
  const inPlayers = allSeason.filter(p => att[p.id] === 'in' && p.type !== 'ir');
  const eligible  = inPlayers.filter(p => matchesPos(p));
  const others    = inPlayers.filter(p => !matchesPos(p));
  const allShown  = [...eligible, ...others];

  const usedIds = new Set();
  ['f1','f2','f3'].forEach(k=>['L','C','R'].forEach(pos=>{const v=lu[k][pos];if(v&&!v.startsWith('spare:'))usedIds.add(v);}));
  ['d1','d2'].forEach(k=>['L','R'].forEach(pos=>{const v=lu[k][pos];if(v&&!v.startsWith('spare:'))usedIds.add(v);}));
  if(lu.g&&!lu.g.startsWith('spare:'))usedIds.add(lu.g);
  const current = lu[slotKey][posKey];
  const currentSpareName = current&&current.startsWith('spare:') ? current.slice(6) : '';

  const grid = allShown.map(p => {
    const inUse = usedIds.has(p.id) && p.id!==current;
    const dimmed = !matchesPos(p);
    return `<div class="pick-card${inUse?' used':''}${p.id===current?' current':''}${dimmed?' dimmed':''}"
      onclick="assignLineupSlot('${gameId}','${slotKey}','${posKey}','${p.id}')">
      ${renderAvatar(p,'md')}
      <div class="pick-name">${esc(p.name)}</div>
      <div class="pick-meta">${esc(p.position||'')}${p.jerseyNumber?' #'+esc(p.jerseyNumber):''}</div>
      ${inUse?'<div class="pick-tag">in use</div>':''}
    </div>`;
  }).join('');

  const emptyMsg = `<div class="matrix-empty" style="padding:20px 12px;">
    No players marked IN for this game.<br>
    <span style="font-size:11px;color:var(--muted);">Go to Game Dashboard and mark players IN first.</span>
  </div>`;

  openModal(`
    <h3>Pick a player</h3>
    <div class="pick-spare-row">
      <img src="data:image/png;base64,${SPARE_B64}" class="pick-spare-av" alt="spare">
      <input type="text" id="spareNameInput" placeholder="spare name..." value="${esc(currentSpareName)}" style="flex:1;padding:7px 10px;font-size:13px;border:1.5px solid var(--line);border-radius:6px;outline:none;">
      <button class="btn btn-rust btn-sm" onclick="assignSpareSlot('${gameId}','${slotKey}','${posKey}')">Add Spare</button>
    </div>
    <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;margin-bottom:10px;">
      ${filter==='fwd'?'FORWARDS':'DEFENSE'} · ${inPlayers.length} IN for this game${others.length && eligible.length ? ' · other positions shown below' : ''}
    </div>
    ${allShown.length === 0 ? emptyMsg : `<div class="pick-grid">${grid}</div>`}
    <div class="modal-actions">
      ${current ? `<button class="btn btn-ghost btn-sm btn-danger" onclick="clearLineupSlot('${gameId}','${slotKey}','${posKey}');closeModal()">Clear slot</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
}

async function assignLineupSlot(gameId, slotKey, posKey, playerId) {
  if (!requireAdmin()) return;
  ensureLineup(gameId);
  const lu = state.lineups[gameId];
  // Only clear from other slots if it's a real player (spares can appear multiple times)
  if (!playerId.startsWith('spare:')) {
    ['f1','f2','f3'].forEach(k=>['L','C','R'].forEach(pos=>{if(lu[k][pos]===playerId)lu[k][pos]='';}));
    ['d1','d2'].forEach(k=>['L','R'].forEach(pos=>{if(lu[k][pos]===playerId)lu[k][pos]='';}));
    if(lu.g===playerId) lu.g='';
  }
  lu[slotKey][posKey] = playerId;
  await saveState(); closeModal(); render();
}

// =============== SCHEDULE ===============
function renderSchedule() {
  const s = activeSeason();
  if (!s) return `<div class="matrix-empty">No active season.</div>`;
  const games = seasonGames(s.id);
  const today = isoToday();
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 10);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  const rows = games.length === 0 ? `<div class="matrix-empty">No games yet${isAdmin ? '. Click "+ Add Game" to start.' : '.'}</div>` :
    games.map(g => {
      const us = parseInt(g.ourScore), them = parseInt(g.theirScore);
      const hasScore = !isNaN(us) && !isNaN(them);
      let resTxt = '—', resCls = '';
      if (hasScore) { resTxt = us + '-' + them; resCls = us > them ? 'good' : us < them ? 'bad' : 'warn'; }
      else if (g.date < today) resTxt = 'no score';
      const bodies = bodiesForGame(g.id, s.id);
      const isUpcoming = g.date && g.date >= today && g.date <= cutoffStr;
      const inOutBtn = isAdmin && isUpcoming ? `<button class="btn btn-ghost btn-sm" onclick="sendInOutWhatsApp('${g.id}')" title="Send IN/OUT request to group chat">📤 IN/OUT?</button>` : '';
      return `<div class="game-card">
        <div class="gnum">G${g.number || '?'}</div>
        <div class="info">
          <div class="opp">${g.isHome ? 'vs' : '@'} ${esc(g.opponent || 'TBD')}${hasScore ? ` <span class="pill ${resCls}">${us > them ? 'W' : us < them ? 'L' : 'T'}</span>` : ''}</div>
          <div class="det">${fmtDateShort(g.date)}${g.time ? ' · ' + fmtAmPm(g.time) : ''}${g.location ? ' · ' + esc(g.location) : ''} · ${bodies} bodies in</div>
        </div>
        <div class="score">${resTxt}</div>
        <div style="display:flex;gap:6px;">${inOutBtn}${isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="openGameForm('${g.id}')">Edit</button>` : ''}</div>
      </div>`;
    }).join('');
  return `<div class="row-spread" style="margin-bottom:14px;">
    <h3 style="font-family:'Fraunces',serif;font-weight:700;font-size:22px;">Schedule · ${esc(s.name)} <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);font-weight:normal;letter-spacing:0.05em;">${games.length} game${games.length === 1 ? '' : 's'}</span></h3>
    ${isAdmin ? `<button class="btn btn-rust" onclick="openAddGame()">+ Add Game</button>` : ''}
  </div>${rows}`;
}

function sendInOutWhatsApp(gameId) {
  if (!requireAdmin()) return;
  const g = state.games.find(x => x.id === gameId);
  if (!g) return;
  const teamName = (state.team?.name || 'Three Bears').toUpperCase();
  const opp = (g.isHome ? 'vs' : '@') + ' ' + (g.opponent || 'TBD');
  const dateStr = g.date ? fmtDateShort(g.date) : 'TBD';
  const timeStr = g.time ? fmtAmPm(g.time) : 'TBD';
  const msg = `🐻🐻🐻 ${teamName} - GAME ${g.number || ''} 🏒\n━━━━━━━━━━━━━━━\n${opp} 📅 ${dateStr} · ${timeStr}\n\nAre you IN or OUT?`;

  // Build modal
  const existing = document.getElementById('inOutModal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'inOutModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--paper-3);border-radius:12px;padding:24px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.3)">
      <h3 style="margin-bottom:12px;font-size:16px;">📤 Copy & send to group chat</h3>
      <textarea id="inOutText" readonly style="width:100%;height:130px;padding:12px;border:1px solid var(--line);border-radius:8px;font-size:14px;line-height:1.6;background:var(--paper-2);resize:none;font-family:inherit">${msg}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-rust" style="flex:1" onclick="
          navigator.clipboard.writeText(document.getElementById('inOutText').value).then(()=>{
            this.textContent='✓ Copied!';
            setTimeout(()=>this.textContent='📋 Copy',1500);
          });
        ">📋 Copy</button>
        <button class="btn btn-ghost" onclick="document.getElementById('inOutModal').remove()">Close</button>
      </div>
    </div>`;
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}

async function toggleArchiveSeason(id) {
  const s = state.seasons.find(x => x.id === id);
  if (!s) return;
  s.archived = !s.archived;
  if (s.archived && state.activeSeasonId === id) {
    const next = state.seasons.find(x => !x.archived && x.id !== id);
    if (next) state.activeSeasonId = next.id;
  }
  await saveState();
  toast(s.archived ? 'Season archived' : 'Season unarchived', 'good');
  render();
}

async function deleteSeason(id) {
  if (state.seasons.length <= 1) { toast('Need at least one season', 'bad'); return; }
  const s = state.seasons.find(x => x.id === id);
  if (!confirm(`Delete season "${s.name}" and all its games, attendance, payments, beers, lineups? Players themselves stay.`)) return;
  state.seasons = state.seasons.filter(x => x.id !== id);
  delete state.rosters[id];
  const toRemove = state.games.filter(g => g.seasonId === id).map(g => g.id);
  state.games = state.games.filter(g => g.seasonId !== id);
  toRemove.forEach(gid => { delete state.attendance[gid]; delete state.beers[gid]; delete state.lineups[gid]; });
  state.payments = state.payments.filter(p => p.seasonId !== id);
  if (state.activeSeasonId === id) state.activeSeasonId = state.seasons[0].id;
  await saveState(); toast('Season deleted', 'good'); render();
}

async function newSeason() {
  if (!requireAdmin()) return;
  const cur = activeSeason();
  if (!cur) { newBlankSeason(); return; }
  const name = prompt('New season name:', 'SUMMER ' + (new Date().getFullYear() + 1));
  if (!name) return;

  const newS = { id: uid(), name, teamFees: cur.teamFees, playoffMinGames: cur.playoffMinGames,
    fullTimeDefault: cur.fullTimeDefault, partTimeDefault: cur.partTimeDefault, archived: false };
  state.seasons.push(newS);
  state.rosters[newS.id] = {};
  const curRoster = state.rosters[cur.id] || {};
  const playerIds = Object.keys(curRoster);

  // Snapshot ending beer balance for every player BEFORE touching anything
  const endingBeerBal = {};
  playerIds.forEach(pid => { endingBeerBal[pid] = beerBalanceFor(pid); });

  // Copy roster entries to new season
  playerIds.forEach(pid => {
    const re = curRoster[pid];
    const alloc = re.type === 'full' ? newS.fullTimeDefault
      : re.type === 'part' ? newS.partTimeDefault
      : (TYPE_INFO[re.type]?.defaultAlloc || 0);
    state.rosters[newS.id][pid] = { type: re.type, jerseyNumber: re.jerseyNumber, hasJersey: re.hasJersey, allocated: alloc, notes: '' };
  });

  state.activeSeasonId = newS.id;

  // Carry over beer balances automatically
  const pidSet = new Set(playerIds);

  // Set each player's startingBeerBalance to their ending balance
  playerIds.forEach(pid => {
    const p = state.players.find(x => x.id === pid);
    if (p) p.startingBeerBalance = Math.round((endingBeerBal[pid] || 0) * 100) / 100;
  });

  // Clear old beer payments for these players (so formula doesn't double-count)
  state.payments = state.payments.filter(p => !(p.fund === 'beer' && pidSet.has(p.playerId)));

  // Clear beer consumption for the old season's games
  const oldGameIds = seasonGames(cur.id).map(g => g.id);
  oldGameIds.forEach(gId => {
    if (state.beers[gId]) {
      pidSet.forEach(pid => { delete state.beers[gId][pid]; });
    }
  });

  await saveState();
  toast(`Created "${name}" with ${playerIds.length} players · Beer balances carried over 🍺`, 'good');
  render();
}

function parseCSVLine(line, sep) {
  if (!sep) sep = line.includes('\t') ? '\t' : ',';
  if (sep === '\t') return line.split('\t').map(s => s.trim());
  const out = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === ',') { out.push(cur); cur = ''; }
      else if (ch === '"') inQ = true;
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map(s => s.trim());
}
function parseNum(s) { return parseFloat(String(s || '').replace(/[^0-9.\-]/g, '')) || 0; }

async function importPlayersCSV(input) {
  if (!requireAdmin()) return;
  const file = input.files && input.files[0];
  if (!file) return;
  const s = activeSeason();
  if (!s) { toast('No active season', 'bad'); return; }

  const reader = new FileReader();
  reader.onload = async e => {
    const text = e.target.result;
    const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
    if (lines.length < 2) { toast('CSV has no data rows', 'bad'); return; }

    const sep = lines[0].includes('\t') ? '\t' : ',';
    const header = parseCSVLine(lines[0], sep).map(h => h.toLowerCase().replace(/[^a-z]/g, ''));
    const idx = {
      name: header.findIndex(h => h === 'name' || h === 'player' || h === 'playername'),
      position: header.findIndex(h => h === 'position' || h === 'pos'),
      type: header.findIndex(h => h === 'type'),
      jersey: header.findIndex(h => h.startsWith('jersey')),
      allocated: header.findIndex(h => h === 'allocated' || h === 'fees' || h === 'fee'),
      beercarry: header.findIndex(h => h.includes('beer') || h.includes('carry')),
      notes: header.findIndex(h => h === 'notes' || h === 'note')
    };
    if (idx.name === -1) { toast('CSV must have a Name column', 'bad'); return; }

    const results = { added: 0, updated: 0, skipped: 0, lines: [] };
    const nameMap = new Map();
    state.players.forEach(p => nameMap.set(p.name.toLowerCase().trim(), p));

    for (let li = 1; li < lines.length; li++) {
      const cols = parseCSVLine(lines[li], sep);
      const name = (cols[idx.name] || '').trim();
      if (!name) { results.skipped++; results.lines.push({ kind: 'skip', txt: `Row ${li + 1}: no name` }); continue; }

      const position = (idx.position >= 0 ? (cols[idx.position] || '') : '').trim().toUpperCase() || 'F';
      const type = (idx.type >= 0 ? (cols[idx.type] || '') : '').trim().toLowerCase() || 'full';
      const jersey = (idx.jersey >= 0 ? (cols[idx.jersey] || '') : '').trim();
      const allocated = parseNum(idx.allocated >= 0 ? cols[idx.allocated] : '');
      const beerCarry = parseNum(idx.beercarry >= 0 ? cols[idx.beercarry] : '');
      const notes = (idx.notes >= 0 ? (cols[idx.notes] || '') : '').trim();

      const validPos = ['F','D','F/D','G'].includes(position) ? position : 'F';
      const validType = ['full','part','goalie','spare','sub','ir'].includes(type) ? type : 'full';

      let p = nameMap.get(name.toLowerCase());
      if (p) {
        p.position = validPos;
        p.startingBeerBalance = beerCarry;
        results.updated++;
        results.lines.push({ kind: 'ok', txt: `Updated: ${name}` });
      } else {
        p = { id: uid(), name, position: validPos, startingBeerBalance: beerCarry, photo: '' };
        state.players.push(p);
        nameMap.set(name.toLowerCase(), p);
        results.added++;
        results.lines.push({ kind: 'ok', txt: `Added: ${name}` });
      }
      state.rosters[s.id][p.id] = {
        type: validType,
        jerseyNumber: jersey,
        hasJersey: !!jersey,
        allocated,
        notes
      };
    }

    await saveState();
    const out = document.getElementById('csvResult');
    if (out) {
      out.innerHTML = `<div class="csv-result">
        <div><strong>${results.added}</strong> added · <strong>${results.updated}</strong> updated · <strong>${results.skipped}</strong> skipped</div>
        <div style="margin-top:6px;">${results.lines.slice(0, 100).map(l => `<div class="${l.kind}">${esc(l.txt)}</div>`).join('')}</div>
        ${results.lines.length > 100 ? `<div style="margin-top:4px;color:var(--muted);">…and ${results.lines.length - 100} more</div>` : ''}
      </div>`;
    }
    toast(`${results.added} added, ${results.updated} updated`, 'good');
    input.value = '';
    render();
  };
  reader.readAsText(file);
}

async function importBulkPhotos(input) {
  if (!requireAdmin()) return;
  const files = Array.from(input.files || []);
  if (files.length === 0) return;

  const norm = s => String(s || '').toLowerCase().replace(/\.[^.]+$/, '').replace(/[^a-z0-9]+/g, '');
  const playerByNorm = new Map();
  state.players.forEach(p => playerByNorm.set(norm(p.name), p));

  const results = { matched: 0, unmatched: 0, lines: [] };
  for (const file of files) {
    const baseName = file.name;
    const key = norm(baseName);
    const p = playerByNorm.get(key);
    if (!p) {
      results.unmatched++;
      results.lines.push({ kind: 'skip', txt: `No match: ${baseName}` });
      continue;
    }
    try {
      const dataUrl = await resizePhotoFile(file);
      p.photo = dataUrl;
      results.matched++;
      results.lines.push({ kind: 'ok', txt: `${baseName} → ${p.name}` });
    } catch (err) {
      results.lines.push({ kind: 'err', txt: `${baseName}: ${err.message}` });
    }
  }

  await saveState();
  const out = document.getElementById('bulkPhotoResult');
  if (out) {
    out.innerHTML = `<div class="csv-result">
      <div><strong>${results.matched}</strong> matched · <strong>${results.unmatched}</strong> unmatched</div>
      <div style="margin-top:6px;">${results.lines.map(l => `<div class="${l.kind}">${esc(l.txt)}</div>`).join('')}</div>
      ${results.unmatched > 0 ? '<div style="margin-top:8px;color:var(--muted);font-size:11px;">Tip: name files exactly like the player (e.g. <code>Paul.jpg</code>). Spaces and case are ignored.</div>' : ''}
    </div>`;
  }
  toast(`${results.matched} photo${results.matched === 1 ? '' : 's'} matched`, results.matched > 0 ? 'good' : 'bad');
  input.value = '';
  render();
}

  if (isIOS) {
    // iOS: show instructions since there's no prompt API
    installBtn.textContent = 'How?';
    subText.textContent = 'Add to Home Screen for the best experience';
    installBtn.addEventListener('click', () => {
      hideBanner(false);
      // Show iOS instruction overlay
      const ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10001;display:flex;align-items:flex-end;justify-content:center;padding:16px;';
      ov.innerHTML = `<div style="background:var(--paper);border-radius:14px;padding:24px;max-width:360px;width:100%;text-align:center;margin-bottom:60px;">
        <div style="font-size:32px;margin-bottom:12px;">🏒</div>
        <h3 style="margin:0 0 8px;font-family:'DM Sans',sans-serif;font-size:16px;">Add Three Bears to Home Screen</h3>
        <p style="margin:0 0 16px;font-size:13px;color:var(--muted);line-height:1.5;">
          Tap the <strong>Share</strong> button <span style="font-size:16px;">⬆</span> at the bottom of Safari,<br>
          then tap <strong>"Add to Home Screen"</strong>.
        </p>
        <button onclick="this.closest('div[style]').remove()" style="background:var(--rust);color:white;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Got it</button>
      </div>`;
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
      document.body.appendChild(ov);
    });
    showBanner();
  } else if (isAndroid) {
    // Android: wait for beforeinstallprompt
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      subText.textContent = 'Install for fast, full-screen access on your Pixel';
      installBtn.addEventListener('click', () => {
        hideBanner(false);
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(result => {
          if (result.outcome === 'accepted') localStorage.setItem(DISMISSED_KEY, '1');
          deferredPrompt = null;
        });
      });
      showBanner();
    });
  }
})();
</script>
</body>
</html>
