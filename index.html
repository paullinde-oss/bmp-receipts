<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Press+Start+2P&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#1A1A1A;--ink-2:#2D2D2D;--ice:#8FB8D4;--ice-light:#D8E7F1;--ice-deep:#4A7FA0;--paper:#F4EFE3;--paper-2:#ECE5D3;--paper-3:#FBF8EF;--rust:#C75A2C;--rust-deep:#8E4324;--text:#1A1A1A;--muted:#6B6B6B;--line:#D9D2C2;--line-dark:#C0B89F;--in-bg:#C8E6C9;--in-text:#1B5E20;--out-bg:#FFCDD2;--out-text:#8E2424;--cut-bg:#BBDEFB;--cut-text:#1565C0;--good:#2C7A4B;--bad:#B83838;--warn:#C99738;--beer-1:#FFF3D6;--beer-2:#FCE3A6;--beer-3:#F5CB6B;--beer-4:#E9A93B;--beer-5:#C77A1F}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--paper);background-image:radial-gradient(circle at 12% 8%,rgba(143,184,212,0.10) 0%,transparent 50%),radial-gradient(circle at 88% 92%,rgba(199,90,44,0.08) 0%,transparent 50%);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;transition:background-image 0.4s}
body.bg-rink::before{content:'';position:fixed;inset:0;background:url('hockey_rink.png') center center/cover no-repeat;opacity:0.07;pointer-events:none;z-index:0}
body.bg-parking::before{content:'';position:fixed;inset:0;background:url('parking_lot.png') center center/cover no-repeat;opacity:0.09;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:22px 20px 80px}
.masthead{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:16px}
.brand-logo{width:120px;height:88px;flex-shrink:0;background-size:contain;background-repeat:no-repeat;background-position:left center;background-position:center}
.brand-text h1{font-family:'Fraunces',serif;font-weight:800;font-size:clamp(30px,5vw,44px);line-height:0.95;letter-spacing:-0.02em;color:var(--ink)}
.brand-text h1 .accent{color:var(--rust);font-style:italic;font-weight:600}
.brand-text .sub{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--muted);margin-top:4px}
.masthead-tools{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.season-pill,.admin-pill{display:flex;align-items:center;gap:8px;padding:7px 12px 7px 14px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.05em;cursor:pointer;border:1px solid transparent;transition:background 0.15s,color 0.15s}
.season-pill{background:var(--ink);color:var(--paper)}
.season-pill select{background:transparent;color:var(--paper);border:none;font:inherit;cursor:pointer;outline:none;padding-right:2px}
.season-pill select option{color:var(--text);background:var(--paper)}
.admin-pill{background:transparent;color:var(--muted);border-color:var(--line-dark)}
.admin-pill:hover{background:var(--paper-2);color:var(--ink)}
.admin-pill.unlocked{background:var(--rust);color:white;border-color:var(--rust)}
.admin-pill.unlocked:hover{background:var(--rust-deep)}
.tabs{display:flex;border-bottom:1px solid var(--line-dark);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;padding:12px 18px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color 0.15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--rust);font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--paper);border:none;padding:8px 14px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background 0.15s;text-decoration:none}
.btn:hover{background:var(--ink-2)}
.btn:active{transform:translateY(1px)}
.btn-rust{background:var(--rust)}
.btn-rust:hover{background:var(--rust-deep)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line-dark)}
.btn-ghost:hover{background:var(--paper-2);border-color:var(--ink)}
.btn-danger{color:var(--bad)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:5px 7px;background:transparent;color:var(--muted);border:1px solid transparent;border-radius:4px;cursor:pointer;line-height:1;font-size:13px}
.btn-icon:hover{background:var(--paper-2);color:var(--ink)}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:14px;padding:7px 9px;border:1px solid var(--line-dark);border-radius:4px;background:var(--paper-3);color:var(--text);outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ink)}
input:disabled,select:disabled,textarea:disabled{background:var(--paper-2);color:var(--muted);cursor:not-allowed}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:4px;font-weight:500}
.field{margin-bottom:12px}
.field-row{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));margin-bottom:12px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--paper-3);border:1px solid var(--line);border-radius:6px;padding:14px 16px}
.stat .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:6px}
.stat .val{font-family:'Fraunces',serif;font-weight:700;font-size:24px;line-height:1;color:var(--ink)}
.stat .note{font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}
.stat.accent{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.stat.accent .lbl{color:rgba(244,239,227,0.6)}
.stat.accent .val{color:var(--paper)}
.stat.accent .note{color:rgba(244,239,227,0.7)}
.stat.warn{background:#FFF8E1;border-color:#F0DCA3}
.stat.warn .val{color:var(--rust-deep)}
.stat.beer{background:linear-gradient(135deg,#FFF3D6,#FCE3A6);border-color:#E9A93B}
.stat.beer .val{color:#8B5A11}
.matrix-wrap{background:var(--paper-3);border:1px solid var(--line);border-radius:6px;overflow-x:auto;margin-bottom:18px;-webkit-overflow-scrolling:touch}
.matrix{border-collapse:separate;border-spacing:0;width:max-content;font-size:13px}
.matrix th,.matrix td{padding:6px 8px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);text-align:center;white-space:nowrap;background:var(--paper-3);height:36px;vertical-align:middle}
.matrix thead th{background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;padding:8px 6px;height:56px;z-index:5}
.matrix thead th .gnum{font-size:9px;opacity:0.6;letter-spacing:0.1em}
.matrix thead th .gdate{font-size:11px;font-weight:600;color:var(--paper);margin:2px 0;text-transform:none;letter-spacing:0}
.matrix thead th .gopp{font-size:10px;color:var(--ice);text-transform:none;letter-spacing:0;font-weight:400}
.matrix thead th .gtime{font-size:9px;color:var(--ice-light);opacity:0.85;text-transform:none;letter-spacing:0;margin-top:1px}
.matrix thead th .gresult{font-size:10px;font-weight:700;text-transform:none;letter-spacing:0;margin-top:3px;padding:1px 4px;border-radius:3px}
.matrix thead th .gresult.good{color:#6ee09a;background:rgba(44,122,75,0.35)}
.matrix thead th .gresult.bad{color:#f5a0a0;background:rgba(184,56,56,0.35)}
.matrix thead th .gresult.warn{color:#f5d87a;background:rgba(201,151,56,0.35)}
.matrix .stk{position:sticky;z-index:3;background:inherit}
.matrix thead .stk{z-index:6;background:var(--ink)}
.matrix .stk-1{left:0;width:32px;min-width:32px}
.matrix .stk-2{left:0;width:38px;min-width:38px}
.matrix .stk-3{left:38px;width:150px;min-width:150px;text-align:left}
.matrix .stk-4{left:188px;width:50px;min-width:50px}
.matrix .stk-5{left:272px;width:80px;min-width:80px}
.matrix .stk-6{left:352px;width:80px;min-width:80px}
.matrix .stk-7{left:432px;width:80px;min-width:80px;border-right:2px solid var(--ink)}
.matrix .stk-7::after{content:'';position:absolute;top:0;right:-8px;width:8px;height:100%;background:linear-gradient(to right,rgba(0,0,0,0.06),transparent);pointer-events:none}
.matrix tbody .stk-3{font-weight:600;text-align:left;cursor:pointer}
.matrix tbody .stk-3:hover{color:var(--rust)}
.matrix tbody .stk-5,.matrix tbody .stk-6,.matrix tbody .stk-7{font-family:'JetBrains Mono',monospace;font-size:12px}
.matrix tbody .bal-paid{color:var(--good);font-weight:600}
.matrix tbody .bal-owe{color:var(--bad);font-weight:600}
.matrix tbody .bal-zero{color:var(--muted)}
.matrix tbody .stk-4{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--rust)}
.matrix tbody .stk-2{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase}
.matrix tbody .stk-1{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.matrix tr.t-full td.stk{background:var(--paper-3)}
.matrix tr.t-part td.stk,.matrix tr.t-part td:not(.stk){background:#FFF7DC}
.matrix tr.t-goalie td.stk,.matrix tr.t-goalie td:not(.stk){background:#E8F5E9}
.matrix tr.t-spare td.stk,.matrix tr.t-spare td:not(.stk){background:#F0EAD6}
.matrix tr.t-sub td.stk,.matrix tr.t-sub td:not(.stk){background:#FFE0B2}
.matrix tr.t-ir td.stk,.matrix tr.t-ir td:not(.stk){background:#FFCDD2}
.matrix tr.t-ir td:not(.stk){opacity:0.75}
.matrix tr:hover td:not(.stk){filter:brightness(0.97)}
.matrix tr.section-divider td{background:var(--ink)!important;color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;text-align:left;padding:6px 12px;height:28px;position:sticky;left:0;z-index:2;}
.matrix .att{width:60px;min-width:60px;user-select:none;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px}
body.is-admin .matrix .att{cursor:pointer}
body.is-admin .matrix .att:hover{filter:brightness(0.95)}
.matrix .att.in{background:var(--in-bg);color:var(--in-text)}
.matrix .att.out{background:var(--out-bg);color:var(--out-text)}
.matrix .att.cut{background:var(--cut-bg);color:var(--cut-text)}
.matrix .beer-cell{width:60px;min-width:60px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;padding:0;position:relative}
.matrix .beer-cell input{width:100%;height:36px;border:none;background:transparent;text-align:center;font:inherit;font-weight:700;color:inherit;padding:0;border-radius:0;appearance:textfield;-moz-appearance:textfield}
.matrix .beer-cell input::-webkit-outer-spin-button,.matrix .beer-cell input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.matrix .beer-cell input:focus{outline:2px solid var(--rust);outline-offset:-2px}
.matrix .beer-cell.b-0{background:var(--paper-3)!important;color:var(--muted)}
.matrix .beer-cell.b-1{background:var(--beer-1)!important;color:#8B5A11}
.matrix .beer-cell.b-2{background:var(--beer-2)!important;color:#8B5A11}
.matrix .beer-cell.b-3{background:var(--beer-3)!important;color:#6B4A0E}
.matrix .beer-cell.b-4{background:var(--beer-4)!important;color:white}
.matrix .beer-cell.b-5{background:var(--beer-5)!important;color:white}
.matrix .beer-cell.not-in{background:repeating-linear-gradient(45deg,var(--paper-2),var(--paper-2) 4px,var(--paper-3) 4px,var(--paper-3) 8px);color:var(--muted)}
.matrix .beer-cell.not-in input{cursor:not-allowed;color:transparent}
.matrix .beer-cell.not-in::before{content:'—';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--line-dark);pointer-events:none}
.matrix .games-played{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:var(--ink);width:70px;min-width:70px;background:#FFE9B0}
.matrix .games-played.zero{color:var(--muted);background:#F5E6C8}
.matrix .eligible{width:60px;min-width:60px;font-family:'JetBrains Mono',monospace;font-weight:700}
.matrix .eligible.yes{color:var(--good)}
.matrix .eligible.no{color:var(--muted)}
.matrix .carry-cell{width:80px;min-width:80px}
.matrix .carry-cell input{width:100%;padding:4px 6px;background:transparent;border:1px dashed transparent;font:inherit;font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center}
body.is-admin .matrix .carry-cell input:hover{border-color:var(--line-dark)}
body.is-admin .matrix .carry-cell input:focus{border-color:var(--rust);background:var(--paper-3)}
.matrix tr.bodies-row td{background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px}
.matrix tr.bodies-row td.stk{background:var(--ink);color:var(--paper)}
.matrix tr.bodies-row td.label{text-align:right;padding-right:12px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ice)}
.matrix tr.bodies-row td.body-cnt{font-size:16px;color:var(--paper)}
.matrix-empty{background:var(--paper-3);border:1px dashed var(--line-dark);padding:40px 20px;text-align:center;color:var(--muted);font-style:italic;border-radius:6px;margin-bottom:18px}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.action-bar .spacer{flex:1}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:-6px;margin-bottom:14px;padding:6px 4px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-sw{display:inline-block;width:18px;height:14px;border-radius:2px;border:1px solid var(--line-dark);text-align:center;line-height:12px;font-weight:700;font-size:11px}
.legend-sw.in{background:var(--in-bg);color:var(--in-text)}
.legend-sw.out{background:var(--out-bg)}
.legend-sw.cut{background:var(--cut-bg)}
.legend-sw.full{background:var(--paper-3)}
.legend-sw.part{background:#FFF7DC}
.legend-sw.goalie{background:#E8F5E9}
.legend-sw.spare{background:#F0EAD6}
.legend-sw.sub{background:#FFE0B2}
.legend-sw.ir{background:#FFCDD2}
.lineup-card{background:var(--paper-3);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:18px}
.lineup-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.lineup-head h3{font-family:'Fraunces',serif;font-weight:700;font-size:22px}
.lineup-grid{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:900px){.lineup-grid{grid-template-columns:1fr 1fr}}
.lineup-section h4{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--line)}
.lineup-row{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center}
.lineup-row.d-row{grid-template-columns:40px 1fr 1fr}
.lineup-row.g-row{grid-template-columns:1fr 1fr}
.lineup-row .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--muted)}
.lineup-row select{padding:6px 8px;font-size:13px;background:white}
.lineup-row select.filled{background:var(--ice-light)}
.lineup-header{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:6px;margin-bottom:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;padding-left:4px}
.lineup-header.d-header{grid-template-columns:40px 1fr 1fr}
.lineup-header span{text-align:center}
.lineup-header span:first-child{text-align:left}
.lineup-summary{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.lineup-summary strong{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-right:4px}
.lineup-empty{text-align:center;color:var(--muted);padding:40px 20px;font-style:italic}
.available-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.available-tag{background:var(--in-bg);color:var(--in-text);padding:3px 10px;border-radius:12px;font-size:12px;font-family:'JetBrains Mono',monospace}
.available-tag.unassigned{background:var(--ice-light);color:var(--ice-deep)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--paper);border-radius:8px;padding:22px;max-width:580px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--line-dark);box-shadow:0 20px 50px rgba(0,0,0,0.3)}
.modal h3{font-family:'Fraunces',serif;font-weight:700;font-size:22px;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:6px;font-size:14px;z-index:200;transition:transform 0.3s;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.good{background:var(--good)}
.toast.bad{background:var(--bad)}
.avatar-px{display:inline-block;flex-shrink:0;background:#D9D9D9;border-radius:4px;overflow:hidden;vertical-align:middle}
.avatar-px svg{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
.avatar-px.sm{width:32px;height:36px}
.avatar-px.sm svg{width:32px;height:36px}
.avatar-px.md{width:64px;height:72px}
.avatar-px.md svg{width:64px;height:72px}
.avatar-px.lg{width:120px;height:135px}
.avatar-px.lg svg{width:120px;height:135px}
.game-card{background:var(--paper-3);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:60px 1fr auto auto;gap:14px;align-items:center}
.game-card .gnum{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--ink);color:var(--paper);padding:4px 8px;border-radius:4px;text-align:center;letter-spacing:0.1em}
.game-card .info .opp{font-weight:600;font-size:15px}
.game-card .info .det{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px}
.game-card .score{font-family:'JetBrains Mono',monospace;font-weight:600;min-width:60px;text-align:right}
.settings-section{margin-bottom:28px}
.settings-section h4{font-family:'Fraunces',serif;font-weight:700;font-size:18px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.season-row{display:grid;grid-template-columns:1fr 120px 90px 90px auto;gap:10px;align-items:center;padding:10px 14px;background:var(--paper-3);border:1px solid var(--line);border-radius:4px;margin-bottom:6px}
.season-row.head{background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase}
.season-row.archived{opacity:0.6}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;background:var(--paper-2);color:var(--muted)}
.pill.good{background:var(--good);color:white}
.pill.bad{background:var(--bad);color:white}
.pill.warn{background:var(--warn);color:white}
.pill.rust{background:var(--rust);color:white}
.help-text{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
.divider{height:1px;background:var(--line);margin:14px 0}
.row-spread{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.profile-header{display:flex;gap:18px;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:16px}
.profile-info h3{font-family:'Fraunces',serif;font-weight:700;font-size:26px;line-height:1.1;margin-bottom:4px}
.profile-info .meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:6px}
.profile-info .meta .jersey{color:var(--rust);font-weight:700}

#pwa-banner .pwa-install{background:var(--rust);color:white;}
#pwa-banner .pwa-dismiss{background:transparent;color:rgba(255,255,255,0.6);font-size:20px;padding:4px 8px;}
.matrix-scroll-outer { position:relative;display:flex;align-items:stretch;gap:0; }
.matrix-scroll-outer .matrix-wrap { flex:1;min-width:0; }
.matrix-arrow { display:none;position:relative;background:var(--paper-3);border:1px solid var(--line);color:var(--ink);font-size:22px;font-weight:700;width:28px;min-width:28px;cursor:pointer;border-radius:0;z-index:5;opacity:0.7;transition:opacity 0.15s;align-self:stretch; }
.matrix-arrow:hover { opacity:1;background:var(--paper-2); }
.matrix-arrow-left { border-radius:6px 0 0 6px;border-right:none; }
.matrix-arrow-right { border-radius:0 6px 6px 0;border-left:none; }
@media(min-width:721px){ .matrix-arrow { display:block; } }

/* ── mobile lineup ── */
@media(max-width:480px){
  .lu-card{width:96px;min-height:158px;}
  .lu-cards-row{gap:6px;}
  .lu-card-name{font-size:11px;}
  .lu-card-empty-icon{width:54px;height:54px;font-size:26px;}
  .sh-slot{min-width:78px;}
}

/* ── Mobile: compact spacing ── */
@media(max-width:600px){
  .app{padding:12px 8px 60px}
  .stats-row{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .stat{padding:10px 11px}
  .stat .val{font-size:20px}
  .stat .note{font-size:10px}
  .action-bar{gap:6px;margin-bottom:8px}
  .btn{padding:7px 11px;font-size:13px}
  .legend{gap:6px;margin-bottom:8px;font-size:10px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .trophy-row{gap:8px;margin:10px 0}
  .trophy-card{padding:12px}
  .matrix-wrap{margin-bottom:12px}
  /* Hide low-value columns on mobile — balance + name + games is enough */
  .matrix .mob-hide{display:none}
  /* Re-anchor sticky columns after hiding */
  .matrix .stk-2{left:0 !important;width:34px !important;min-width:34px !important}
  .matrix .stk-3{left:34px !important;width:94px !important;min-width:94px !important}
  .matrix .stk-4{left:128px !important;width:30px !important;min-width:30px !important;font-size:10px;padding:4px 2px}
  .matrix .stk-5{display:none !important}
  .matrix .stk-6{display:none !important}
  .matrix .stk-7{left:158px !important;width:70px !important;min-width:70px !important}
  /* Compact game columns */
  .game-col{min-width:40px !important;padding:4px 2px !important}
  .gnum{font-size:8px}
  .gdate,.gopp{font-size:8px}
  /* Compact matrix cells */
  .matrix th,.matrix td{padding:5px 5px}
  /* Avatar in name cell */
  .matrix-av{width:22px !important;height:22px !important}
  .games-played,.eligible{min-width:34px !important;font-size:11px}
  /* Shrink avatar in matrix name cell */
  .matrix-name-cell img,.matrix-name-cell span[style*="border-radius:50%"]{
    width:22px !important;height:22px !important;font-size:9px !important;flex-shrink:0
  }
  /* Balance cell compact */
  .matrix .stk-7{font-size:11px}
  /* Pos cell compact */
  .matrix .stk-2{font-size:10px;padding:4px 2px}
  /* Name cell compact */
  .matrix .stk-3{font-size:12px}
  /* J# cell compact */
  .matrix .stk-4{font-size:11px;padding:4px 3px}

  /* Beer matrix: show Balance (stk-6) instead of Paid (stk-4) on mobile */
  .beer-matrix-wrap .stk-4{display:none !important}
  .beer-matrix-wrap .stk-5{display:none !important}
  .beer-matrix-wrap .stk-5b{display:none !important}
  .beer-matrix-wrap .stk-6{
    display:table-cell !important;
    left:128px !important;
    width:72px !important;
    min-width:72px !important;
    font-size:11px;
  }
}

<div id="splashScreen" style="position:fixed;inset:0;background:#1A2B3C;z-index:10000;display:flex;align-items:center;justify-content:center;cursor:pointer;">
  <video id="splashVideo" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover;" onended="document.getElementById('splashScreen').remove()">
    <source id="splashSrc" src="" type="video/mp4">
  </video>
  <audio id="splashAudio">
    <source id="splashAudioSrc" src="" type="audio/mpeg">
  </audio>
  <!-- Tap to skip -->
  <div onclick="document.getElementById('splashScreen').remove(); document.getElementById('splashAudio').pause();" style="position:absolute;inset:0;z-index:1;"></div>
  <!-- Sound button -->
  <button id="soundBtn" onclick="event.stopPropagation(); toggleSplashSound();" style="position:absolute;bottom:24px;left:24px;z-index:2;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:44px;height:44px;font-size:22px;cursor:pointer;backdrop-filter:blur(4px);">🔇</button>
</div>
<script>
  const isMobile = window.innerWidth < 900 || window.innerHeight < 800;
  const splashVideo = document.getElementById('splashVideo');
  document.getElementById('splashSrc').src = isMobile ? 'splash_screen_1080_1920.mp4' : 'splash_screen_1920_1080.mp4';
  document.getElementById('splashAudioSrc').src = isMobile ? 'splash_screen_1080_1920_sound.mp3' : 'splash_screen_1920_1080_sound.mp3';

  // Skip splash if video hasn't started within 2 seconds
  const splashTimeout = setTimeout(() => {
    const splash = document.getElementById('splashScreen');
    if (splash) splash.remove();
  }, 2000);

  // Video started playing — cancel the timeout, it loaded fine
  splashVideo.addEventListener('playing', () => clearTimeout(splashTimeout));

  // Can't autoplay at all — skip immediately
  splashVideo.play().catch(() => {
    clearTimeout(splashTimeout);
    const splash = document.getElementById('splashScreen');
    if (splash) splash.remove();
  });

  let soundOn = false;
  function toggleSplashSound() {
    const audio = document.getElementById('splashAudio');
    const btn = document.getElementById('soundBtn');
    if (soundOn) {
      audio.pause();
      btn.textContent = '🔇';
      soundOn = false;
    } else {
      audio.currentTime = 0;
      audio.play();
      btn.textContent = '🔊';
      soundOn = true;
    }
  }
</script>

<script>
// =============== FIREBASE CONFIG ===============

// Generate a unique ID for this browser session so we can ignore our own writes
const SESSION_ID = Math.random().toString(36).slice(2, 14);
let _lastSyncTs = 0; // tracks our last save timestamp

// Initialize Firebase
let _firebaseReady = false;
let _firebaseDb = null;
let _firebaseError = null;
try {
  if (firebaseConfig.apiKey && firebaseConfig.apiKey !== 'REPLACE_ME_API_KEY') { // Corrected line
    firebase.initializeApp(firebaseConfig); // Corrected line
    _firebaseDb = firebase.database();

  } else {

    console.warn('[Hub] Firebase not configured — see FIREBASE_CONFIG block at top of script');

  _firebaseError = err.message;
  console.error('[Hub] Firebase init failed:', err);

// =============== STORAGE SHIM (replaces window.storage) ===============
// Provides the same API but backed by Firebase Realtime Database
// All data lives under "/hub/<key>" — shared by all viewers
window.storage = {
  async get(key, shared) {
    if (!_firebaseReady) return null;
    try {
      const snap = await _firebaseDb.ref('hub/' + key).once('value');
      const wrapped = snap.val();
      if (wrapped === null || wrapped === undefined) return null;
      // Stored format: { value: "<state JSON>", writerId: "<session>" }
      const value = (typeof wrapped === 'object' && wrapped.value !== undefined) ? wrapped.value : wrapped;
      return { key, value, shared: !!shared };
    } catch (err) {
      console.error('[Hub] storage.get failed:', err);
      return null;
    }
  },
  async set(key, value, shared) {
    if (!_firebaseReady) return null;
    try {
      const _ts = Date.now(); _lastSyncTs = _ts;
      await _firebaseDb.ref('hub/' + key).set({ value, writerId: SESSION_ID, ts: _ts });
      return { key, value, shared: !!shared };
    } catch (err) {
      console.error('[Hub] storage.set failed:', err);
      return null;
    }
  },
  async delete(key, shared) {
    if (!_firebaseReady) return null;
    try {
      await _firebaseDb.ref('hub/' + key).remove();
      return { key, deleted: true, shared: !!shared };
    } catch (err) {
      console.error('[Hub] storage.delete failed:', err);
      return null;
    }
  },
  async list() { return { keys: [] }; }
};

let _syncListenerSetup = false;

  _syncListenerSetup = true;
  let isFirst = true;
  let _lastKnownTs = 0;
  _firebaseDb.ref('hub/' + stateKey).on('value', snap => {
    if (isFirst) { isFirst = false; return; }  // ignore initial fetch
    const wrapped = snap.val();
    if (!wrapped || typeof wrapped !== 'object') return;
    if (wrapped.writerId === SESSION_ID) return;  // our own write echoing back
    // Ignore if this is older than the last state we saved ourselves
    if (wrapped.ts && _lastSyncTs && wrapped.ts <= _lastSyncTs) return;
    _lastKnownTs = wrapped.ts || 0;
    try {
      const newState = JSON.parse(wrapped.value);
      if (newState && typeof newState === 'object') {
        state = newState;
        ensureDefaults();
        if (typeof render === 'function') render();
        if (typeof toast === 'function') toast('Synced from another device', 'good');
      }
    } catch (err) {
      console.error('[Hub] Sync update failed:', err);
    }
  });
}

  if (!_firebaseReady) {

      banner.innerHTML = _firebaseError === 'not_configured'
        ? '⚠️ Firebase not configured. Edit the FIREBASE_CONFIG block at the top of the &lt;script&gt; in this file. Your data won\'t save until you do.'
        : '⚠️ Firebase connection failed: ' + _firebaseError;
      document.body.appendChild(banner);
    }, 200);
  }
});

// =============== PLAYER AVATAR ===============
function defaultAvatar() { return {}; }

const AVATAR_COLORS = ['#C66B3D','#3D6C8C','#7A6840','#5E8C5A','#8C5A6C','#6C5A8C','#A07F3B','#5A8C8C'];

function avatarColorFor(name) {
  const s = String(name || '?');
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function initialsFor(name) {
  const parts = String(name || '?').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function renderAvatar(player, size, flip) {
  const dims = { sm: 32, md: 56, lg: 88 };
  const d = dims[size] || 32;
  const fs = flip ? 'transform:scaleX(-1);' : '';
  if (player && player.spare) {
    return `<img src="data:image/png;base64,${SPARE_B64}" style="width:${d}px;height:${d}px;object-fit:contain;${fs}" alt="spare">`;
  }
  const photo = player && player.photo;
  if (photo) {
    return `<img src="${photo}" style="width:${d}px;height:${d}px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--line);background:#eee;${fs}" alt="">`;
  }
  const color = avatarColorFor(player ? player.name : '');
  const initials = initialsFor(player ? player.name : '');
  const fontSize = Math.round(d * 0.38);
  // Initials circles are never flipped (text would mirror)
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${d}px;height:${d}px;border-radius:50%;background:${color};color:white;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:${fontSize}px;flex-shrink:0;letter-spacing:-0.02em;">${initials}</span>`;
}


function renderAvatarBody(player) { return ''; }

function resizePhotoFile(file) {
  return new Promise((resolve, reject) => {
    if (!file) return reject(new Error('No file'));
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const target = 256;
        const minDim = Math.min(img.width, img.height);
        const sx = (img.width - minDim) / 2;
        const sy = (img.height - minDim) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = target;
        canvas.height = target;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, target, target);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = () => reject(new Error('Image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Read failed'));
    reader.readAsDataURL(file);
  });
}

// ── Photo crop tool (separate overlay, preserves existing modal) ──
let _crop = null;

function handlePhotoChange(input, previewId, hiddenId) {
  const file = input.files && input.files[0];
  if (!file) return;
  // Use FileReader (data URL) — works everywhere, no blob URL issues
  const reader = new FileReader();
  reader.onload = e => openCropOverlay(e.target.result, previewId, hiddenId);
  reader.readAsDataURL(file);
  input.value = ''; // allow re-pick same file
}

function openCropOverlay(dataUrl, previewId, hiddenId) {
  // Remove any existing crop overlay first
  const existing = document.getElementById('cropOverlay');
  if (existing) existing.remove();

  const ov = document.createElement('div');
  ov.id = 'cropOverlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
  ov.innerHTML = `
    <div style="background:var(--paper);border-radius:16px;padding:22px 20px;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <h3 style="font-family:'Fraunces',serif;font-weight:700;margin:0 0 14px;color:var(--ink);">Crop Photo</h3>
      <div style="text-align:center;">
        <canvas id="cropCanvas" width="280" height="280"
          style="border-radius:50%;cursor:move;border:3px solid var(--ice);touch-action:none;display:block;margin:0 auto 10px;background:#eee;">
        </canvas>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Drag to move · Scroll or slider to zoom</div>
        <input type="range" id="cropZoom" min="1" max="5" step="0.05" value="1" style="width:200px;accent-color:var(--rust);">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
        <button type="button" class="btn btn-ghost" onclick="closeCropOverlay()">Cancel</button>
        <button type="button" class="btn btn-rust" onclick="applyCrop('${previewId}','${hiddenId}')">Use Photo</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);

  // Load image and init crop state
  const img = new Image();
  img.onload = () => {
    _crop = { img, zoom: 1, ox: img.naturalWidth/2, oy: img.naturalHeight/2, dragging: false, lx: 0, ly: 0 };
    drawCropCanvas();

    const canvas = document.getElementById('cropCanvas');

    document.getElementById('cropZoom').addEventListener('input', e => {
      _crop.zoom = parseFloat(e.target.value);
      clampCrop(); drawCropCanvas();
    });

    const onDown = (cx,cy) => { _crop.dragging=true; _crop.lx=cx; _crop.ly=cy; };
    const onMove = (cx,cy) => {
      if (!_crop || !_crop.dragging) return;
      const px = (Math.min(_crop.img.naturalWidth,_crop.img.naturalHeight)/_crop.zoom)/280;
      _crop.ox -= (cx-_crop.lx)*px; _crop.oy -= (cy-_crop.ly)*px;
      _crop.lx=cx; _crop.ly=cy; clampCrop(); drawCropCanvas();
    };
    const onUp = () => { if(_crop) _crop.dragging=false; };

    canvas.addEventListener('mousedown', e => { onDown(e.clientX,e.clientY); e.preventDefault(); });
    document.addEventListener('mousemove', e => onMove(e.clientX,e.clientY));
    document.addEventListener('mouseup', onUp);
    canvas.addEventListener('touchstart', e => { onDown(e.touches[0].clientX,e.touches[0].clientY); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchmove', e => { onMove(e.touches[0].clientX,e.touches[0].clientY); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchend', onUp);
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      _crop.zoom = Math.max(1, Math.min(5, _crop.zoom - e.deltaY*0.005));
      document.getElementById('cropZoom').value = _crop.zoom;
      clampCrop(); drawCropCanvas();
    }, {passive:false});
  };
  img.onerror = () => toast('Could not load photo — try a different image file', 'bad');
  img.src = dataUrl;
}

function closeCropOverlay() {
  const ov = document.getElementById('cropOverlay');
  if (ov) ov.remove();
  _crop = null;
}

function clampCrop() {
  if (!_crop) return;
  const {img,zoom} = _crop;
  const base = Math.min(img.naturalWidth, img.naturalHeight);
  const hv = (base/zoom)/2;
  const hw = (img.naturalWidth/base)*hv;
  const hh = (img.naturalHeight/base)*hv;
  _crop.ox = Math.max(hw, Math.min(img.naturalWidth-hw, _crop.ox));
  _crop.oy = Math.max(hh, Math.min(img.naturalHeight-hh, _crop.oy));
}

function drawCropCanvas() {
  const canvas = document.getElementById('cropCanvas');
  if (!canvas || !_crop) return;
  const {img,zoom,ox,oy} = _crop;
  const base = Math.min(img.naturalWidth, img.naturalHeight);
  const vw = (img.naturalWidth/base)*(base/zoom);
  const vh = (img.naturalHeight/base)*(base/zoom);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,280,280);
  ctx.drawImage(img, ox-vw/2, oy-vh/2, vw, vh, 0, 0, 280, 280);
}

function applyCrop(previewId, hiddenId) {
  if (!_crop) { toast('Photo still loading, please wait a moment','bad'); return; }
  const {img,zoom,ox,oy} = _crop;
  const base = Math.min(img.naturalWidth, img.naturalHeight);
  const vw = (img.naturalWidth/base)*(base/zoom);
  const vh = (img.naturalHeight/base)*(base/zoom);
  const out = document.createElement('canvas');
  out.width = 256; out.height = 256;
  out.getContext('2d').drawImage(img, ox-vw/2, oy-vh/2, vw, vh, 0, 0, 256, 256);
  const dataUrl = out.toDataURL('image/jpeg', 0.88);
  const prev = document.getElementById(previewId);
  if (prev) prev.innerHTML = `<img src="${dataUrl}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:2px solid var(--line);">`;
  const hid = document.getElementById(hiddenId);
  if (hid) hid.value = dataUrl;
  closeCropOverlay();
}

function clearPhotoField(previewId, hiddenId, name) {
  const preview = document.getElementById(previewId);
  if (preview) preview.innerHTML = renderAvatar({ name }, 'lg');
  const hidden = document.getElementById(hiddenId);
  if (hidden) hidden.value = '';
}

let state = {
  schemaVersion: 3,
  team: { name:'Three Bears', league:'Mensa League' },
  pricePerBeer: 3,
  adminPin: '',
  activeSeasonId: null,
  seasons: [], players: [], rosters: {},
  games: [], attendance: {}, beers: {}, payments: [], lineups: {}
};

let isAdmin = false;
let activeTab = 'dashboard';
let lineupGameId = null;
const unlockedPastGames = new Set(); // games admin has unlocked for editing
function setLineupGame(id) { lineupGameId = id; render(); }

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

async function loadState() {
  // Set up real-time sync listener — fires when another device writes state
  setupRealtimeSync(STATE_KEY);
  try {
    const r = await window.storage.get(STATE_KEY, true);
    if (r && r.value) { state = JSON.parse(r.value); ensureDefaults(); return; }
  } catch (e) {}
  try {
    const r = await window.storage.get(STATE_KEY_V2, false);
    if (r && r.value) {
      const v2 = JSON.parse(r.value);
      state = migrateV2(v2);
      ensureDefaults();
      await saveState();
      toast('Migrated your previous data', 'good');
      return;
    }
  } catch (e) {}
  freshInit();
  await saveState();
}

function migrateV2(v2) {
  return {
    schemaVersion: 3,
    team: v2.team || { name:'Three Bears', league:'Mensa League' },
    pricePerBeer: 3, adminPin: '',
    activeSeasonId: v2.activeSeasonId,
    seasons: v2.seasons || [],
    players: (v2.players || []).map(p => ({ ...p, startingBeerBalance: 0, avatar: defaultAvatar() })),
    rosters: v2.rosters || {}, games: v2.games || [],
    attendance: v2.attendance || {}, beers: {},
    payments: (v2.payments || []).map(p => ({ ...p, fund: 'team' })),
    lineups: v2.lineups || {}
  };
}

function freshInit() {
  const seasonId = uid();
  state = {
    schemaVersion: 3,
    team: { name:'Three Bears', league:'Mensa League' },
    pricePerBeer: 3, adminPin: '',
    activeSeasonId: seasonId,
    seasons: [{ id: seasonId, name: 'SUMMER ' + new Date().getFullYear(), teamFees: 0, playoffMinGames: 4, fullTimeDefault: 467, partTimeDefault: 233, archived: false }],
    players: [], rosters: { [seasonId]: {} },
    games: [], attendance: {}, beers: {}, payments: [], lineups: {}
  };
}

function ensureDefaults() {
  if (!state.team) state.team = { name: 'Three Bears', league: 'Mensa League' };
  if (!state.seasons) state.seasons = [];
  if (!state.players) state.players = [];
  if (!state.games) state.games = [];
  if (state.pricePerBeer == null) state.pricePerBeer = 3;
  if (state.adminPin == null) state.adminPin = '';
  if (!state.beers) state.beers = {};
  if (!state.rosters) state.rosters = {};
  if (!state.attendance) state.attendance = {};
  if (!state.lineups) state.lineups = {};
  if (!state.payments) state.payments = [];
  state.players.forEach(p => {
    if (p.startingBeerBalance == null) p.startingBeerBalance = 0;
    if (!p.avatar) p.avatar = defaultAvatar();
  });
  state.payments.forEach(p => { if (!p.fund) p.fund = 'team'; });
  state.seasons.forEach(s => {
    if (s.playoffMinGames == null || s.playoffMinGames === 5) s.playoffMinGames = 4;
    if (s.fullTimeDefault == null) s.fullTimeDefault = 467;
    if (s.partTimeDefault == null) s.partTimeDefault = 233;
    if (s.teamFees == null) s.teamFees = 0;
    if (!state.rosters[s.id]) state.rosters[s.id] = {};
  });
}

async function saveState() {
  if (!isAdmin && state.adminPin && state.adminPin.length > 0) { toast('View-only mode', 'bad'); return false; }
  try { await window.storage.set(STATE_KEY, JSON.stringify(state), true); return true; }
  catch (e) { toast('Save failed: ' + e.message, 'bad'); return false; }
}

// =============== ACCESSORS ===============
function activeSeason() { return state.seasons.find(s => s.id === state.activeSeasonId) || state.seasons[0]; }
function seasonRoster(sId) { return state.rosters[sId] || {}; }
function getRosterEntry(pId, sId) { return state.rosters[sId] ? state.rosters[sId][pId] : null; }
function seasonPlayers(sId) {
  const r = seasonRoster(sId);
  return Object.keys(r).map(pid => {
    const p = state.players.find(x => x.id === pid);
    if (!p) return null;
    return { ...p, ...r[pid], id: pid };
  }).filter(Boolean);
}
function seasonGames(sId) {
  return state.games.filter(g => g.seasonId === sId)
    .sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.number || 0) - (b.number || 0));
}
function playerPaymentsSum(pId, sId, fund) {
  return state.payments.filter(p =>
    p.playerId === pId && (sId == null || p.seasonId === sId) && (fund == null || p.fund === fund)
  ).reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
}
function gamesPlayedFor(pId, sId) {
  const today = isoToday();
  return seasonGames(sId).filter(g => g.date <= today)
    .filter(g => state.attendance[g.id] && state.attendance[g.id][pId] === 'in').length;
}
function bodiesForGame(gId, sId) {
  const att = state.attendance[gId] || {};
  return seasonPlayers(sId).filter(p => att[p.id] === 'in' && p.type !== 'ir' && p.type !== 'goalie').length;
}
function beersForGame(gId) {
  const b = state.beers[gId] || {};
  return Object.values(b).reduce((s, n) => s + (parseInt(n) || 0), 0);
}
function totalBeersForPlayer(pId) {
  let total = 0;
  Object.keys(state.beers).forEach(gId => { total += parseInt((state.beers[gId] || {})[pId]) || 0; });
  return total;
}
function gamesPlayedAllTime(pId) {
  // Only count games where at least 1 beer has been logged (game has happened)
  let n = 0;
  Object.keys(state.attendance).forEach(gId => {
    const gameHappened = Object.values(state.beers[gId]||{}).some(v=>parseInt(v)>0);
    if (gameHappened && (state.attendance[gId]||{})[pId]==='in') n++;
  });
  return n;
}
function avgBeersPerGame(pId) {
  const g = gamesPlayedAllTime(pId);
  if (g === 0) return 0;
  return totalBeersForPlayer(pId) / g;
}
function beerBalanceFor(pId) {
  const p = state.players.find(x => x.id === pId);
  if (!p) return 0;
  return (parseFloat(p.startingBeerBalance) || 0) + playerPaymentsSum(pId, null, 'beer') - (totalBeersForPlayer(pId) * (state.pricePerBeer || 0));
}

// =============== UTILS ===============
function fmt(n) { return '$' + (parseFloat(n) || 0).toFixed(2); }
function fmtSigned(n) { const v = parseFloat(n) || 0; return (v < 0 ? '-$' : '$') + Math.abs(v).toFixed(2); }
function fmtCompact(n) {
  const v = parseFloat(n) || 0;
  if (v === 0) return '$0';
  return '$' + v.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}
function parseDateLocal(s) { if (!s) return null; const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDateShort(s) { if (!s) return '—'; const d = parseDateLocal(s); return d ? d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' }) : s; }
function fmtDateTiny(s) { if (!s) return ''; const d = parseDateLocal(s); return d ? d.toLocaleDateString(undefined, { month:'short', day:'numeric' }) : s; }
function fmtDayShort(s) { if (!s) return ''; const d = parseDateLocal(s); return d ? d.toLocaleDateString(undefined, { weekday:'short' }) : ''; }
function fmtAmPm(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  if (isNaN(h)) return t;
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m||0).padStart(2,'0')} ${ampm}`;
}
function isoToday() { return new Date().toISOString().slice(0, 10); }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => { t.className = 'toast'; }, 2200);
}

function calSelectAll(checked) {
  document.querySelectorAll('.cal-check').forEach(cb => cb.checked = checked);
}

function getSelectedGames() {
  const s = activeSeason();
  if (!s) return [];
  const games = seasonGames(s.id);
  const selected = new Set([...document.querySelectorAll('.cal-check:checked')].map(cb => cb.dataset.gid));
  return games.filter(g => selected.has(g.id));
}

function gameToICSDate(dateStr, timeStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split('-').map(Number);
  const pad = n => String(n).padStart(2, '0');
  if (timeStr) {
    const parts = timeStr.split(':');
    const startH = parseInt(parts[0]);
    const startM = parseInt(parts[1]) || 0;
    let endH = startH + 1;
    let endM = startM;
    if (endH >= 24) endH = 23;
    const dtStart = `${y}${pad(m)}${pad(d)}T${pad(startH)}${pad(startM)}00`;
    const dtEnd   = `${y}${pad(m)}${pad(d)}T${pad(endH)}${pad(endM)}00`;
    return { dtStart, dtEnd, allDay: false };
  } else {
    const dtStart = `${y}${pad(m)}${pad(d)}`;
    const dtEnd = incrementDate(dateStr).replace(/-/g, '');
    return { dtStart, dtEnd, allDay: true };
  }
}

function buildICS(games) {
  const team = state.team?.name || 'Three Bears';
  const s = activeSeason();
  const seasonName = s?.name || '';
  const now = new Date();
  const stamp = now.toISOString().replace(/[-:.]/g,'').slice(0,15) + 'Z';

  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Three Bears Hockey Hub//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    `X-WR-CALNAME:${team} Schedule`,
    'X-WR-TIMEZONE:America/Vancouver',
  ];

  games.forEach(g => {
    const dates = gameToICSDate(g.date, g.time);
    if (!dates) return;
    const title = `${team} vs ${g.opponent || 'TBD'}`;
    const desc = `Game ${g.number || '?'} · ${seasonName}`;
    const loc = g.rinkName || '';
    const uid = `${g.id}-${Date.now()}@threebearshockey`;

    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${uid}`);
    lines.push(`DTSTAMP:${stamp}`);
    if (dates.allDay) {
      lines.push(`DTSTART;VALUE=DATE:${dates.dtStart}`);
      lines.push(`DTEND;VALUE=DATE:${dates.dtEnd}`);
    } else {
      lines.push(`DTSTART:${dates.dtStart}`);
      lines.push(`DTEND:${dates.dtEnd}`);
    }
    lines.push(`SUMMARY:${title}`);
    lines.push(`DESCRIPTION:${desc}`);
    if (loc) lines.push(`LOCATION:${loc}`);
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadICS() {
  const games = getSelectedGames();
  if (!games.length) { alert('Please select at least one game.'); return; }
  const ics = buildICS(games);
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const teamSlug = (state.team?.name || 'three-bears').replace(/\s+/g, '-').toLowerCase();
  a.href = url;
  a.download = `${teamSlug}-schedule.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const tip = document.getElementById('calTip');
  if (tip) {
    tip.innerHTML = '✅ Downloaded! Open the file — Apple Calendar imports all games at once. On Android, open with Google Calendar.';
    tip.style.color = 'var(--rust)';
    tip.style.fontWeight = '600';
  }
}

function openGoogleCalendar() {
  const games = getSelectedGames();
  if (!games.length) { alert('Please select at least one game.'); return; }
  const team = state.team?.name || 'Three Bears';
  const s = activeSeason();

  if (games.length > 3) {
    const proceed = confirm(`Google Calendar adds one game per browser tab.\n\nYou've selected ${games.length} games — this will open ${games.length} tabs.\n\nTip: "Apple / .ics" adds all games at once and also works on Android.\n\nOpen ${games.length} tabs anyway?`);
    if (!proceed) return;
  }

  games.forEach((g, i) => {
    const dates = gameToICSDate(g.date, g.time);
    if (!dates) return;
    const title = encodeURIComponent(`${team} vs ${g.opponent || 'TBD'}`);
    const details = encodeURIComponent(`Game ${g.number || '?'} · ${s?.name || ''}${g.rinkName ? '\nRink: ' + g.rinkName : ''}`);
    const loc = encodeURIComponent(g.rinkName || '');
    const datesParam = dates.allDay
      ? `${dates.dtStart}/${dates.dtEnd}`
      : `${dates.dtStart}/${dates.dtEnd}`;
    const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${datesParam}&details=${details}&location=${loc}`;
    setTimeout(() => window.open(url, '_blank'), i * 400);
  });
}

function incrementDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d + 1);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function scrollMatrix(btn, dir) {

function scrollToRecentGame() {
  const wrap = document.querySelector('.matrix-scroll-outer .matrix-wrap');
  if (!wrap) return;
  const today = isoToday();
  const s = activeSeason();
  if (!s) return;
  const games = seasonGames(s.id);
  let recentIdx = -1;
  games.forEach((g, i) => { if (g.date && g.date <= today) recentIdx = i; });
  if (recentIdx < 0) return;
  const stickyWidth = 310;
  const colWidth = 54;
  const scrollTo = stickyWidth + (recentIdx * colWidth) - (wrap.clientWidth / 2);
  wrap.scrollLeft = Math.max(0, scrollTo);
}

function renderHeader() {
  const name = state.team.name || 'Team';
  const parts = name.split(' ');
  let displayName = esc(name);
  if (parts.length >= 2) {
    const last = parts.pop();
    displayName = esc(parts.join(' ')) + ' <span class="accent">' + esc(last) + '</span>';
  }
  document.getElementById('teamName').innerHTML = displayName;
  document.getElementById('teamLeague').textContent = 'Hockey Hub' + (state.team.league ? ' · ' + state.team.league : '');
  const sel = document.getElementById('seasonSelect');
  const active = state.seasons.filter(s => !s.archived);
  const archived = state.seasons.filter(s => s.archived);
  let html = active.map(s => `<option value="${s.id}" ${s.id === state.activeSeasonId ? 'selected' : ''}>${esc(s.name)}</option>`).join('');
  if (archived.length) {
    html += '<optgroup label="Archived">';
    html += archived.map(s => `<option value="${s.id}" ${s.id === state.activeSeasonId ? 'selected' : ''}>${esc(s.name)}</option>`).join('');
    html += '</optgroup>';
  }
  sel.innerHTML = html;
  applyAdminClass();
}

function render() {
  renderHeader();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
  document.body.classList.remove('bg-rink','bg-parking');
  if (activeTab === 'dashboard' || activeTab === 'lineup') document.body.classList.add('bg-rink');
  else if (activeTab === 'beer') document.body.classList.add('bg-parking');
  const c = document.getElementById('content');
  if (activeTab === 'dashboard') { c.innerHTML = renderDashboard(); setTimeout(scrollToRecentGame, 50); }
  else if (activeTab === 'beer') { c.innerHTML = renderBeerBank(); setTimeout(scrollToRecentGame, 50); }
  else if (activeTab === 'schedule') c.innerHTML = renderSchedule();
  else if (activeTab === 'settings') c.innerHTML = renderSettings();
}

function openShareLineup(gameId) {
  const game = state.games.find(g=>g.id===gameId);
  if (!game) return;
  ensureLineup(gameId);
  const lu = state.lineups[gameId];
  const s = activeSeason();
  const players = seasonPlayers(s?.id||'');
  const games = seasonGames(s?.id||'');
  const sp = v => slotPlayer(v, players);

  // Beer totals & BPG per player
  const beerTotals = {};
  players.forEach(p => {
    beerTotals[p.id] = games.reduce((sum,g)=>sum+(parseInt((state.beers?.[g.id]||{})[p.id])||0),0);
  });
  const bpgMap = {};
  players.forEach(p => {
    const playedGames = games.filter(g => Object.values(state.beers?.[g.id]||{}).some(v=>parseInt(v)>0));
    const gp = playedGames.filter(g=>(state.attendance?.[g.id]?.[p.id]==='in')).length;
    bpgMap[p.id] = gp>0 ? (beerTotals[p.id]/gp).toFixed(1) : '0.0';
  });

  // Team stats
  const scored = games.filter(g=>!isNaN(parseInt(g.ourScore))&&!isNaN(parseInt(g.theirScore)));
  const wins = scored.filter(g=>parseInt(g.ourScore)>parseInt(g.theirScore)).length;
  const losses = scored.filter(g=>parseInt(g.ourScore)<parseInt(g.theirScore)).length;
  const totalBeers = players.reduce((s,p)=>s+beerTotals[p.id],0);
  const teamBpg = scored.length>0 ? (totalBeers/scored.length).toFixed(1) : '0.0';

  // Render player card
  const renderCard = (p, pos) => {
    if (!p) return `<div class="sc-card sc-empty"><span class="sc-empty-name">—</span></div>`;
    const flip = pos==='RW'||pos==='RD';
    const flipStyle = flip ? 'transform:scaleX(-1);' : '';
    const jersey = p.jerseyNumber||p.jersey||'?';
    const bpg = p.spare ? '—' : (bpgMap[p.id]||'0.0');
    const noteHtml = p.notes ? `<div class="sc-note">${esc(p.notes)}</div>` : '';
    return `<div class="sc-card">
      <div class="sc-av-col">
        <div style="${flipStyle}">${renderAvatar(p,'sm')}</div>
        <div class="sc-pos">${pos}</div>
      </div>
      <div class="sc-info">
        <div class="sc-name">${esc(p.name)}</div>
        <div class="sc-row2">
          <span class="sc-jersey">#${esc(jersey)}</span>
          <span class="sc-bpg">🍺 ${bpg}</span>
        </div>
        ${noteHtml}
      </div>
    </div>`;
  };

  const fwdSlots = [
    {p:sp(lu.f1?.L),pos:'LW'},{p:sp(lu.f1?.C),pos:'C'},{p:sp(lu.f1?.R),pos:'RW'},
    {p:sp(lu.f2?.L),pos:'LW'},{p:sp(lu.f2?.C),pos:'C'},{p:sp(lu.f2?.R),pos:'RW'},
    {p:sp(lu.f3?.L),pos:'LW'},{p:sp(lu.f3?.C),pos:'C'},{p:sp(lu.f3?.R),pos:'RW'},
  ];
  // Only trim completely empty lines from the end
  let lastFwdLine = 0;
  if (sp(lu.f3?.L)||sp(lu.f3?.C)||sp(lu.f3?.R)) lastFwdLine = 9;
  else if (sp(lu.f2?.L)||sp(lu.f2?.C)||sp(lu.f2?.R)) lastFwdLine = 6;
  else if (sp(lu.f1?.L)||sp(lu.f1?.C)||sp(lu.f1?.R)) lastFwdLine = 3;
  const activeFwdSlots = fwdSlots.slice(0, lastFwdLine);

  const defSlots = [
    {p:sp(lu.d1?.L),pos:'LD'},{p:sp(lu.d1?.R),pos:'RD'},
    {p:sp(lu.d2?.L),pos:'LD'},{p:sp(lu.d2?.R),pos:'RD'},
  ];
  let lastDefLine = 0;
  if (sp(lu.d2?.L)||sp(lu.d2?.R)) lastDefLine = 4;
  else if (sp(lu.d1?.L)||sp(lu.d1?.R)) lastDefLine = 2;
  const activeDefSlots = defSlots.slice(0, lastDefLine);
  const goalieP = sp(lu.g);
  const fCount = activeFwdSlots.filter(s=>s.p).length;
  const dCount = activeDefSlots.filter(s=>s.p).length;

  const dateStr = game.date ? fmtDateShort(game.date) : '';
  const timeStr = game.time ? fmtAmPm(game.time) : '';
  const oppStr = (game.isHome?'vs ':'@ ')+(game.opponent||'TBD');

  const existing = document.getElementById('shareOverlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'share-overlay';
  overlay.id = 'shareOverlay';
  overlay.innerHTML = `
    <div class="share-card-new" id="shareCard">
      <div class="scn-header">
        <div class="scn-header-left">
          <img src="data:image/png;base64,${PIXEL_LOGO_B64}" class="scn-logo">
          <div>
            <div class="scn-game-num">GAME ${game.number||''}</div>
            <div class="scn-game-detail">${dateStr}${timeStr?' · '+timeStr:''}<br>${oppStr}</div>
          </div>
        </div>
        <div class="scn-counts">
          <div class="scn-count-row">F: <span>${fCount}</span></div>
          <div class="scn-count-row">D: <span>${dCount}</span></div>
          <div class="scn-count-row">Bodies: <span>${fCount+dCount}</span></div>
        </div>
      </div>
      <div class="scn-section-hdr">⚔ FORWARDS</div>
      <div class="scn-grid">${activeFwdSlots.map(s=>renderCard(s.p,s.pos)).join('')}</div>
      <div class="scn-section-hdr">🛡 DEFENSE</div>
      <div class="scn-grid-2">${activeDefSlots.map(s=>renderCard(s.p,s.pos)).join('')}</div>
      <div class="scn-bottom">
        <div>
          <div class="scn-section-hdr" style="padding-left:0;">🥅 GOALIE</div>
          ${renderCard(goalieP,'G')}

        <div class="scn-stats-col">

            <div class="scn-stat-item">${wins}-${losses}</div>

  `;
  document.body.appendChild(overlay);
}

function renderMatrix(s, players, games) {
  const playoffMin = parseInt(s.playoffMinGames) || 4;
  const today = isoToday();

  let head = `<tr>
    <th class="stk stk-2">Pos</th><th class="stk stk-3">Name</th>
    <th class="stk stk-4">J#</th><th class="stk stk-5 mob-hide">Allocated</th><th class="stk stk-6 mob-hide">Paid</th>
    <th class="stk stk-7">Balance</th>`;
  games.forEach((g, idx) => {
    const us = parseInt(g.ourScore), them = parseInt(g.theirScore);
    const hasScore2 = !isNaN(us) && !isNaN(them);
    const resultLabel = hasScore2 ? (us > them ? `<div class="gresult good">W ${us}-${them}</div>` : us < them ? `<div class="gresult bad">L ${us}-${them}</div>` : `<div class="gresult warn">T ${us}-${them}</div>`) : '';
    const isPast = g.date && g.date < today;
    const isUnlocked = unlockedPastGames.has(g.id);
    const lockBtn = isPast && isAdmin ? `<div class="game-lock-btn" onclick="event.stopPropagation();toggleGameLock('${g.id}')" title="${isUnlocked ? 'Lock this game' : 'Unlock to edit attendance'}">${isUnlocked ? '🔓' : '🔒'}</div>` : '';
    head += `<th class="game-col${isPast && !isUnlocked ? ' game-past-locked' : ''}" title="${esc(g.opponent || 'TBD')} — ${fmtDateShort(g.date)}" ${isAdmin ? `onclick="openGameForm('${g.id}')" style="cursor:pointer;"` : ''}>
      <div class="gnum">GAME ${g.number || idx + 1}</div>
      <div class="gdate">${fmtDayShort(g.date)} ${fmtDateTiny(g.date)}</div>
      <div class="gopp">${esc(g.opponent || 'TBD')}</div>
      ${g.time ? `<div class="gtime">${fmtAmPm(g.time)}</div>` : ''}
      ${resultLabel}
      ${lockBtn}
    </th>`;
  });
  head += `<th class="games-played">Played</th><th class="eligible">Playoff<br><span style="font-size:9px;opacity:0.7;">(${playoffMin}g)</span></th></tr>`;

  let body = '';
  let lastType = null;
  players.forEach((p, idx) => {
    if (p.type !== lastType) {
      const info = TYPE_INFO[p.type] || TYPE_INFO.full;
      body += `<tr class="section-divider">
        <td class="stk stk-2" style="padding-left:8px" colspan="2">${info.label}</td>
        <td class="stk stk-4"></td><td class="stk stk-5 mob-hide"></td><td class="stk stk-6 mob-hide"></td><td class="stk stk-7"></td>
        ${games.map(() => `<td></td>`).join('')}<td></td><td></td>
      </tr>`;
      lastType = p.type;
    }
    const allocated = parseFloat(p.allocated) || 0;
    const paid = playerPaymentsSum(p.id, s.id, 'team');
    const balance = allocated - paid;
    let balCls = 'bal-zero', balTxt = '—';
    if (allocated > 0) {
      if (balance <= 0.01) { balCls = 'bal-paid'; balTxt = '✓ paid'; }
      else { balCls = 'bal-owe'; balTxt = fmt(balance); }
    } else if (paid > 0) { balCls = 'bal-paid'; balTxt = '✓'; }
    const gp = gamesPlayedFor(p.id, s.id);
    const eligible = gp >= playoffMin;
    const tintMap = { full:'#FFFAE8',part:'#F3FAF3',sub:'#F0F0FB',spare:'#F7F7F7',goalie:'#FFF4E0',ir:'#FFF0F0' };
    const rowTint = tintMap[p.type]||'transparent';
    body += `<tr class="t-${p.type}" data-pid="${p.id}" style="background:${rowTint}">
      <td class="stk stk-2">${esc(p.position || '')}</td>
      <td class="stk stk-3" onclick="openProfile('${p.id}')" style="cursor:pointer"><span class="matrix-name-cell" style="display:inline-flex;align-items:center;gap:5px">${renderAvatar(p, 'sm')}<span>${esc(p.name)}</span></span></td>
      <td class="stk stk-4">${esc(p.jerseyNumber || '')}</td>
      <td class="stk stk-5 mob-hide">${fmtCompact(allocated)}</td>
      <td class="stk stk-6" ${isAdmin ? `onclick="openPaymentModal('${p.id}','team')" style="cursor:pointer;" title="Click to record payment"` : ''}>${fmtCompact(paid)}</td>
      <td class="stk stk-7 ${balCls}">${balTxt}</td>`;
    games.forEach(g => {
      const isPast = g.date && g.date < today;
      const isUnlocked = unlockedPastGames.has(g.id);
      const editable = isAdmin && (!isPast || isUnlocked);
      const status = (state.attendance[g.id] && state.attendance[g.id][p.id]) || '';
      const attIcon = status==='in' ? '✓' : status==='out' ? '✗' : status==='cut' ? '✓' : '';
      const cellCls = (status ? 'att ' + status : 'att') + (isPast && !isUnlocked ? ' att-locked' : '');
      body += `<td class="${cellCls}" ${editable ? `onclick="cycleAttend('${g.id}','${p.id}')"` : ''} title="${esc(p.name)} — Game ${g.number || ''}${isPast && !isUnlocked ? ' (locked — click 🔓 to edit)' : ''}">${attIcon}</td>`;
    });
    body += `<td class="games-played ${gp === 0 ? 'zero' : ''}">${gp}</td>
      <td class="eligible ${eligible ? 'yes' : 'no'}">${eligible ? '✓' : ''}</td></tr>`;
  });

  let bodiesRow = `<tr class="bodies-row">
    <td class="stk stk-1"></td><td class="stk stk-2"></td>
    <td class="stk stk-3 label">Bodies</td>
    <td class="stk stk-4"></td><td class="stk stk-5"></td>
    <td class="stk stk-6"></td><td class="stk stk-7"></td>`;
  games.forEach(g => { bodiesRow += `<td class="body-cnt">${bodiesForGame(g.id, s.id)}</td>`; });
  const avgBodies = games.length === 0 ? 0 : (games.reduce((sum, g) => sum + bodiesForGame(g.id, s.id), 0) / games.length).toFixed(1);
  bodiesRow += `<td colspan="2" class="body-cnt" style="font-size:13px;">avg ${avgBodies}</td></tr>`;

  return `<div class="matrix-scroll-outer"><button class="matrix-arrow matrix-arrow-left" onclick="scrollMatrix(this,-1)" title="Scroll left">‹</button><div class="matrix-wrap"><table class="matrix"><thead>${head}</thead><tbody>${body}${bodiesRow}</tbody></table></div><button class="matrix-arrow matrix-arrow-right" onclick="scrollMatrix(this,1)" title="Scroll right">›</button></div>`;
}

async function cycleAttend(gameId, playerId) {
  if (!requireAdmin()) return;
  if (!state.attendance[gameId]) state.attendance[gameId] = {};
  const cur = state.attendance[gameId][playerId] || '';
  const next = cur === '' ? 'in' : cur === 'in' ? 'out' : cur === 'out' ? 'cut' : '';
  if (next === '') delete state.attendance[gameId][playerId];
  else state.attendance[gameId][playerId] = next;
  // Auto-remove from lineup if player is no longer IN
  if (next !== 'in' && state.lineups[gameId]) {
    const lu = state.lineups[gameId];
    ['f1','f2','f3'].forEach(k => { if(lu[k]) ['L','C','R'].forEach(p => { if(lu[k][p]===playerId) lu[k][p]=''; }); });
    ['d1','d2'].forEach(k => { if(lu[k]) ['L','R'].forEach(p => { if(lu[k][p]===playerId) lu[k][p]=''; }); });
    if(lu.g===playerId) lu.g='';
  }
  await saveState();
  render();
}

async function cycleAllAttend() {
  if (!requireAdmin()) return;
  const s = activeSeason();
  if (!confirm('Mark all blank cells as IN for every player & every game?')) return;
  seasonGames(s.id).forEach(g => {
    if (!state.attendance[g.id]) state.attendance[g.id] = {};
    seasonPlayers(s.id).forEach(p => { if (!state.attendance[g.id][p.id]) state.attendance[g.id][p.id] = 'in'; });
  });
  await saveState();
  toast('Marked all IN', 'good');
  render();
}

// ── Beer award helpers ──
function seasonBeersForPlayer(pId, sId) {
  const games = seasonGames(sId);
  return games.reduce((sum, g) => sum + (parseInt((state.beers[g.id]||{})[pId])||0), 0);
}

function seasonBPGForPlayer(pId, sId) {
  const games = seasonGames(sId);
  // Only count games where at least 1 beer has been logged (game has happened)
  const playedGames = games.filter(g => Object.values(state.beers[g.id]||{}).some(v=>parseInt(v)>0));
  const inGames = playedGames.filter(g => (state.attendance[g.id]||{})[pId]==='in');
  if (inGames.length === 0) return 0;
  const total = inGames.reduce((sum,g) => sum + (parseInt((state.beers[g.id]||{})[pId])||0), 0);
  return total / inGames.length;
}

function threeBeerPoints(pId, sId) {
  const games = seasonGames(sId);
  return games.filter(g => (parseInt((state.beers[g.id]||{})[pId])||0) === 3).length;
}

function teamBPG(sId) {
  const games = seasonGames(sId);
  const active = games.filter(g => Object.values(state.beers[g.id]||{}).some(v=>parseInt(v)>0));
  if (!active.length) return 0;
  const total = active.reduce((s,g)=>s+beersForGame(g.id),0);
  return total / active.length;
}

// Returns [{p, v}] of top scorer(s), or [] if nobody has >= minVal
function topAward(players, valFn, minVal) {
  const scored = players.map(p=>({p, v:valFn(p.id)})).filter(x=>x.v>=minVal);
  if (!scored.length) return [];
  const best = Math.max(...scored.map(x=>x.v));
  return scored.filter(x=>x.v===best);
}
