  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #f66d07; --accent2: #d45a00; --admin: #a78bfa; --warn: #fbbf24;
    --radius: 12px; --font-head: 'Helvetica Neue', Helvetica, Arial, sans-serif; --font-mono: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px); --safe-top: env(safe-area-inset-top, 0px);
  }

  /* DARK MODE (default) */
  :root, [data-theme="dark"] {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --text: #ffffff; --text-dim: #aaaaaa; --text-muted: #666666; --btn-text: #1a0800;
    --input-bg: #1a1a1a; --card-bg: #1a1a1a; --modal-bg: #1a1a1a;
    --shadow: rgba(0,0,0,0.4);
  }

  /* LIGHT MODE */
  [data-theme="light"] {
    --bg: #f0f0f0; --surface: #ffffff; --surface2: #e8e8e8; --border: #d0d0d0;
    --text: #111111; --text-dim: #444444; --text-muted: #888888; --btn-text: #ffffff;
    --input-bg: #ffffff; --card-bg: #ffffff; --modal-bg: #ffffff;
    --shadow: rgba(0,0,0,0.1);
  }
  [data-theme="light"] .app-wrap { background-image: none; }

  html { height: -webkit-fill-available; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-head); min-height: 100vh; min-height: -webkit-fill-available; -webkit-text-size-adjust: 100%; overscroll-behavior-y: none; transition: background 0.2s, color 0.2s; }
  input, select, textarea, button { font-family: var(--font-head); -webkit-appearance: none; appearance: none; }

  .app-wrap { min-height: 100vh; background: var(--bg); background-image: radial-gradient(ellipse at 20% 0%, rgba(246,109,7,0.05) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(224,92,42,0.04) 0%, transparent 60%); transition: background 0.2s; }

  /* THEME TOGGLE */
  .theme-toggle { background: none; border: 1px solid var(--border); border-radius: 20px; color: var(--text-dim); font-size: 14px; padding: 5px 10px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
  .theme-toggle:active { border-color: var(--accent); color: var(--accent); }

  /* LOGIN */
  .login-screen { min-height: 100vh; min-height: -webkit-fill-available; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px calc(24px + var(--safe-bottom)); gap: 32px; }
  .login-logo { text-align: center; }
  .login-logo .brand { font-family: var(--font-head); font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .login-logo h1 { font-family: var(--font-head); font-size: clamp(22px, 7vw, 52px); font-weight: 800; line-height: 1.05; color: var(--text); white-space: nowrap; }
  .login-logo h1 span { color: var(--accent); }
  .login-logo .tagline { margin-top: 10px; font-size: 13px; color: var(--text-muted); }
  .user-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 460px; }
  .user-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--font-head); font-weight: 700; font-size: 13px; padding: 18px 8px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 8px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .user-btn:active, .user-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .user-btn .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 15px; border: 1px solid var(--border); }
  .admin-unlock { width: 100%; max-width: 460px; border-top: 1px solid var(--border); padding-top: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .admin-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; text-transform: uppercase; }
  .admin-row { display: flex; gap: 8px; width: 100%; }
  .admin-input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-head); font-size: 16px; padding: 12px 14px; outline: none; transition: border-color 0.15s; }
  .admin-input:focus { border-color: var(--admin); }
  .admin-btn { background: rgba(167,139,250,0.1); border: 1px solid var(--admin); border-radius: 10px; color: var(--admin); font-family: var(--font-head); font-weight: 700; font-size: 14px; padding: 12px 20px; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .admin-btn:active { background: rgba(167,139,250,0.25); }

  /* HEADER */
  .header { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 10px 14px; padding-top: calc(10px + var(--safe-top)); display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: background 0.2s; }
  [data-theme="light"] .header { background: rgba(240,240,240,0.97); }
  .header-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .header-logo { font-family: var(--font-head); font-size: 16px; font-weight: 800; line-height: 1.1; color: var(--text); white-space: nowrap; }
  .header-logo span { color: var(--accent); }
  .header-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .header-user { font-size: 11px; color: var(--text-dim); background: var(--surface2); padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); white-space: nowrap; }
  .admin-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.3); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--admin); white-space: nowrap; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font-head); font-size: 11px; padding: 7px 10px; border-radius: 8px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
  .logout-btn:active, .logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* TABS */
  .tabs { display: flex; gap: 0; padding: 0 4px; border-bottom: 1px solid var(--border); background: var(--bg); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; transition: background 0.2s; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { background: none; border: none; color: var(--text-muted); font-family: var(--font-head); font-size: 11px; letter-spacing: 0.02em; text-transform: uppercase; padding: 14px 14px 12px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .tab:hover, .tab:active { color: var(--text-dim); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab.admin-tab.active { color: var(--admin); border-bottom-color: var(--admin); }

  /* MAIN */
  .main { padding: 16px 16px calc(32px + var(--safe-bottom)); max-width: 600px; margin: 0 auto; }
  .section-title { font-family: var(--font-head); font-size: 11px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }

  /* CAPTURE HERO */
  .capture-hero { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 20px; }
  .capture-hero-btn {
    width: 100%; background: var(--accent); color: #1a0800;
    border: none; border-radius: var(--radius);
    font-family: var(--font-head); font-size: 20px; font-weight: 800;
    padding: 24px 20px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    box-shadow: 0 4px 20px rgba(246,109,7,0.35);
  }
  .capture-hero-btn:active { background: var(--accent2); transform: scale(0.98); box-shadow: 0 2px 10px rgba(246,109,7,0.2); }
  .capture-hero-btn .hero-icon { font-size: 40px; }
  .capture-hero-btn .hero-label { font-size: 18px; letter-spacing: 0.02em; }
  .capture-hero-btn .hero-sub { font-size: 12px; font-weight: 400; opacity: 0.7; font-family: var(--font-head); }
  .capture-secondary { display: flex; gap: 10px; width: 100%; }
  .capture-secondary-btn {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-dim); font-family: var(--font-head);
    font-size: 12px; padding: 12px 8px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .capture-secondary-btn:hover, .capture-secondary-btn:active { border-color: var(--accent); color: var(--text); }
  .capture-secondary-btn .sec-icon { font-size: 18px; }
  .manual-link { background: none; border: none; color: var(--text-muted); font-family: var(--font-head); font-size: 13px; cursor: pointer; text-decoration: underline; padding: 4px 0; -webkit-tap-highlight-color: transparent; }
  .manual-link:hover { color: var(--text-dim); }

  /* SCANNING STATE */
  .scanning-overlay {
    background: var(--surface); border: 1.5px solid var(--accent);
    border-radius: var(--radius); padding: 24px 20px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .scanning-spinner { width: 36px; height: 36px; border: 3px solid rgba(246,109,7,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .scanning-label { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--accent); }
  .scanning-sub { font-size: 12px; color: var(--text-muted); }

  /* UPLOAD BUTTONS (kept for compatibility) */
  .upload-btns { display: none; }

  /* RECEIPT PREVIEW — fixed for desktop + mobile */
  .preview-wrap { position: relative; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; border: 2px solid var(--accent); background: var(--surface2); }
  .preview-wrap img { width: 100%; max-height: 320px; object-fit: contain; display: block; background: var(--surface2); }
  .preview-remove { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 13px; padding: 7px 13px; cursor: pointer; font-family: var(--font-head); backdrop-filter: blur(4px); -webkit-tap-highlight-color: transparent; }
  .preview-remove:hover, .preview-remove:active { background: rgba(224,92,42,0.8); }

  /* AI BADGE */
  .ai-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(246,109,7,0.08); border: 1px solid rgba(246,109,7,0.25); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: var(--accent); margin-bottom: 14px; }
  .ai-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FORM */
  .form-row { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; text-transform: uppercase; margin-bottom: 6px; }
  .form-input, .form-select { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-head); font-size: 16px; padding: 13px 14px; outline: none; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-head); font-size: 16px; padding: 13px 14px; outline: none; transition: border-color 0.15s; resize: none; min-height: 80px; }
  .form-textarea:focus { border-color: var(--accent); }
  .form-textarea::placeholder { color: var(--text-muted); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }

  /* FOLDERS */
  .folder-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
  .folder-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text-dim); font-family: var(--font-head); font-size: 13px; padding: 14px 12px; cursor: pointer; transition: all 0.15s; text-align: left; display: flex; align-items: center; gap: 10px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; min-height: 52px; }
  .folder-btn:hover, .folder-btn:active { border-color: var(--accent); color: var(--text); }
  .folder-btn.selected { background: rgba(246,109,7,0.08); border-color: var(--accent); color: var(--accent); }
  .new-folder-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .new-folder-row input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-head); font-size: 16px; padding: 12px 14px; outline: none; min-width: 0; }
  .new-folder-row input:focus { border-color: var(--accent); }
  .new-folder-row button { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text-dim); font-family: var(--font-head); font-size: 13px; padding: 12px 16px; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .new-folder-row button:hover { border-color: var(--accent); color: var(--accent); }

  /* BUTTONS */
  .submit-btn { width: 100%; background: var(--accent); color: #1a0800; border: none; border-radius: var(--radius); font-family: var(--font-head); font-size: 16px; font-weight: 700; padding: 18px; cursor: pointer; transition: all 0.15s; display: block; text-align: center; text-decoration: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .submit-btn:hover, .submit-btn:active { background: var(--accent2); transform: scale(0.98); }
  .submit-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; transform: none; }
  .secondary-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text-dim); font-family: var(--font-head); font-size: 14px; padding: 13px 16px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .secondary-btn:hover, .secondary-btn:active { border-color: var(--accent); color: var(--text); }
  .danger-btn { background: rgba(255,107,53,0.08); border: 1px solid var(--accent2); border-radius: 10px; color: var(--accent2); font-family: var(--font-head); font-size: 14px; padding: 13px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .danger-btn:hover, .danger-btn:active { background: rgba(255,107,53,0.2); }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 16px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .icon-btn:hover, .icon-btn:active { border-color: var(--accent); color: var(--accent); }
  .export-btn { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-head); font-weight: 600; font-size: 14px; padding: 15px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; -webkit-tap-highlight-color: transparent; }
  .export-btn:hover, .export-btn:active { border-color: var(--accent); color: var(--accent); }
  .export-btn.admin { border-color: rgba(167,139,250,0.3); color: var(--admin); }
  .export-btn.admin:hover { background: rgba(167,139,250,0.06); border-color: var(--admin); }

  /* PROGRESS */
  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }

  /* TOAST */
  .toast-wrap { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; width: 90vw; max-width: 400px; }
  .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 20px; font-size: 13px; color: var(--text); animation: slideUp 0.25s ease; text-align: center; width: 100%; box-shadow: 0 4px 20px var(--shadow); }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }
  .toast.warn { border-color: var(--warn); color: var(--warn); }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* RECEIPTS */
  .filter-bar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .filter-bar .filter-row { display: flex; gap: 8px; }
  .filter-bar input, .filter-bar select { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-head); font-size: 16px; padding: 11px 12px; outline: none; min-width: 0; appearance: none; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
  .search-btn { background: var(--accent); color: #1a0800; border: none; border-radius: 10px; font-family: var(--font-head); font-weight: 700; font-size: 18px; padding: 11px 18px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .receipt-list { display: flex; flex-direction: column; gap: 10px; }
  .receipt-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s; }
  .receipt-card:hover, .receipt-card:active { background: var(--surface2); }
  .receipt-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
  .receipt-thumb-placeholder { width: 56px; height: 56px; border-radius: 8px; background: var(--surface2); flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .receipt-info { flex: 1; min-width: 0; }
  .receipt-vendor { font-family: var(--font-head); font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .receipt-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  .receipt-meta span { font-size: 11px; color: var(--text-muted); }
  .tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--text-dim); }
  .tag.user { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.2); color: var(--admin); }
  .tag.edited { background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.2); color: var(--warn); }
  .receipt-amount { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

  /* ADMIN */
  .user-section { margin-bottom: 28px; }
  .user-section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(167,139,250,0.06); border: 1px solid rgba(167,139,250,0.15); border-radius: 10px; margin-bottom: 10px; }
  .user-section-name { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--admin); display: flex; align-items: center; gap: 8px; }
  .user-section-stats { font-size: 12px; color: var(--text-muted); }

  /* SUMMARY */
  .summary-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  .summary-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .summary-card .s-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 6px; }
  .summary-card .s-val { font-family: var(--font-head); font-size: 24px; font-weight: 700; color: var(--text); }
  .summary-card .s-val.accent { color: var(--accent); }

  /* MODAL — bottom sheet on mobile, centered on desktop */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
  .modal { background: var(--modal-bg); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 8px 20px calc(24px + var(--safe-bottom)); width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; animation: slideUp 0.3s ease; }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--text); }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-size: 16px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .modal img { width: 100%; border-radius: 10px; margin-bottom: 16px; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-row .dk { color: var(--text-muted); }
  .detail-row .dv { color: var(--text); text-align: right; max-width: 60%; word-break: break-word; }
  .detail-row .dv.total { color: var(--accent); font-family: var(--font-head); font-weight: 700; font-size: 18px; }

  /* SETTINGS */
  .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
  .settings-section-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--text-dim); margin-bottom: 16px; letter-spacing: 0.02em; text-transform: uppercase; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .settings-row:last-child { margin-bottom: 0; }
  .settings-label { font-size: 14px; color: var(--text); }
  .settings-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* MISC */
  .empty-state { text-align: center; padding: 56px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-state p { font-size: 14px; }
  .loading { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .warn-box { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 14px; color: var(--warn); }

  /* RESPONSIVE */
  @media (min-width: 500px) {
    .modal { border-radius: 20px; margin: 20px; max-height: 88vh; align-self: center; }
    .modal-overlay { align-items: center; padding: 20px; }
    .modal-handle { display: none; }
  }
  @media (max-width: 400px) {
    .user-grid { grid-template-columns: repeat(4, 1fr); }
    .form-row-3 { grid-template-columns: 1fr 1fr; }
    .summary-cards { grid-template-columns: 1fr; }
    .main { padding: 14px 14px calc(28px + var(--safe-bottom)); }
  }
  @media (max-width: 320px) {
    .user-grid { grid-template-columns: repeat(2, 1fr); }
    .upload-btns { grid-template-columns: 1fr; }
